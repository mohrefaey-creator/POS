<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Brewbook POS — Coffee Shop Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #faf7f2;
  --bg-2: #f3ede3;
  --ink: #1a1410;
  --ink-2: #4a3f35;
  --ink-3: #8a7e72;
  --line: #e6ddcf;
  --line-2: #d8cdba;
  --paper: #fffdf8;
  --accent: #c2410c;        /* burnt orange */
  --accent-2: #7c2d12;      /* deep coffee */
  --accent-3: #166534;      /* money green */
  --warn: #b45309;
  --bad: #b91c1c;
  --good: #166534;
  --shadow-sm: 0 1px 2px rgba(26, 20, 16, 0.06);
  --shadow-md: 0 4px 16px rgba(26, 20, 16, 0.08);
  --shadow-lg: 0 12px 40px rgba(26, 20, 16, 0.12);
  --radius: 10px;
  --radius-lg: 16px;
  --display: 'Inter', system-ui, -apple-system, sans-serif;
  --body: 'Inter', system-ui, -apple-system, sans-serif;
  --mono: 'Inter', system-ui, -apple-system, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: var(--body);
  color: var(--ink);
  background: var(--bg);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

body[dir="rtl"] {
  --display: 'Cairo', system-ui, -apple-system, sans-serif;
  --body:    'Cairo', system-ui, -apple-system, sans-serif;
  --mono:    'Cairo', system-ui, -apple-system, sans-serif;
  font-family: var(--body);
}

button { font: inherit; color: inherit; cursor: pointer; border: none; background: none; }
input, select, textarea { font: inherit; color: inherit; }
input[type="number"]::-webkit-inner-spin-button { opacity: 0; }
input[type="number"]:hover::-webkit-inner-spin-button { opacity: 1; }

.app {
  display: grid;
  grid-template-columns: 220px 1fr;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  background: linear-gradient(180deg, #0c1a2e 0%, #163152 100%);
  color: #e8eef7;
  padding: 4px 0 20px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #1e3a5f;
}

.brand {
  padding: 0 22px 0;
  border-bottom: 1px solid #1e3a5f;
  margin-bottom: 0;
}
.brand h1 {
  font-family: var(--display);
  font-weight: 600;
  font-size: 22px;
  letter-spacing: -0.02em;
  font-variation-settings: 'opsz' 144;
  display: flex; align-items: center; gap: 8px;
}
.brand h1 .dot { width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);}
.brand-logo { display:block; max-width: 100%; height: auto; max-height: 168px; object-fit: contain; margin: -16px 0 -8px -28px; background: transparent; mix-blend-mode: lighten; }
.lock-logo  { display:block; max-width: 480px; max-height: 220px; width: 100%; height: auto; object-fit: contain; margin: 0 auto 0; background: transparent; mix-blend-mode: lighten; }
.lock-stack { display: flex; flex-direction: column; align-items: center; }
.lock-shop  { font-size: 22px; font-weight: 700; color: #8ea4c2; letter-spacing: 0.1em; text-transform: uppercase; margin-top: -6px; margin-bottom: 22px; }
.brand .sub { font-size: 11px; color: #8ea4c2; margin-top: 4px; letter-spacing: 0.05em; text-transform: uppercase;}

.nav { flex: 1; padding: 0 12px; overflow-y: auto; }
.nav-section { margin: 8px 0 4px; padding: 0 10px; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #8ea4c2; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 8px;
  color: #d8cdba; font-size: 13px; font-weight: 500;
  width: 100%; text-align: start;
  transition: all 0.15s;
}
.nav-item:hover { background: rgba(255,255,255,0.05); color: #faf7f2; }
.nav-item.active { background: var(--accent); color: white; }
.nav-item .icon { width:16px;height:16px;flex-shrink:0;}

.shop-meta { padding: 16px 22px; border-top: 1px solid #1e3a5f; font-size: 11px; color: #8ea4c2; }
.shop-meta .label { font-size:10px;text-transform:uppercase;letter-spacing:0.05em;}
.shop-meta .val { color:#d3e0f0; font-size:13px; margin-top:2px;}

/* MAIN */
.main { overflow-y: auto; background: var(--bg); }
.page { padding: 24px 32px; max-width: 1600px; }
.page-header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
.page-title { font-family: var(--display); font-weight:500; font-size: 28px; letter-spacing:-0.02em; font-variation-settings:'opsz' 144; }
.page-subtitle { color: var(--ink-3); font-size: 13px; margin-top: 2px; }
.page-actions { display:flex; gap:8px; align-items:center; }

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 8px;
  font-weight: 500; font-size: 13px;
  background: white; color: var(--ink);
  border: 1px solid var(--line);
  transition: all 0.15s;
}
.btn:hover { border-color: var(--ink-3); }
.btn-primary { background: var(--ink); color: white; border-color: var(--ink); }
.btn-primary:hover { background: var(--accent-2); border-color: var(--accent-2); }
.btn-accent { background: var(--accent); color: white; border-color: var(--accent); }
.btn-accent:hover { background: var(--accent-2); }
.btn-danger { background: white; color: var(--bad); border-color: var(--line); }
.btn-danger:hover { background: var(--bad); color: white; border-color: var(--bad); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-lg { padding: 11px 18px; font-size: 14px; }
.btn-icon { padding: 7px; aspect-ratio: 1; }

/* INPUTS */
.field { display:flex; flex-direction:column; gap:4px; }
.field label { font-size: 11px; font-weight: 500; color: var(--ink-2); text-transform:uppercase; letter-spacing:0.04em; }
.input, select.input, textarea.input {
  padding: 8px 12px; border-radius: 8px;
  border: 1px solid var(--line); background: white;
  font-size: 13px; outline: none; transition: border-color 0.15s, box-shadow 0.15s;
  width: 100%;
}
.input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(194,65,12,0.1); }

/* CARDS */
.card { background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-sm); }
.card-h { font-family: var(--display); font-weight: 500; font-size: 16px; margin-bottom: 12px; letter-spacing: -0.01em; }

/* STAT TILES */
.stat-row { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat {
  background: var(--paper); border: 1px solid var(--line);
  border-radius: var(--radius-lg); padding: 16px 18px;
  position: relative; overflow: hidden;
}
.stat::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background: var(--accent); opacity: 0.5; }
.stat .lbl { font-size:11px; color: var(--ink-3); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; font-weight:500; }
.stat .num { font-family: var(--display); font-size: 26px; font-weight: 600; letter-spacing:-0.02em; line-height: 1.1; font-variation-settings:'opsz' 144; }
.stat .delta { font-size:11px; margin-top:4px; color: var(--ink-3); }
.stat .delta.up { color: var(--good); }
.stat .delta.down { color: var(--bad); }
.stat.alert { background: rgba(220,38,38,0.06); border-color: rgba(220,38,38,0.45); }
.stat.alert::before { background: var(--bad); opacity: 1; }
.stat.alert .lbl { color: var(--bad); }
.stat.alert .num { color: var(--bad); }

/* TABLES */
table.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
table.tbl th { text-align: start; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-3); padding: 10px 12px; border-bottom: 1px solid var(--line); white-space: nowrap; }
table.tbl td { padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: middle; }
table.tbl tr:hover td { background: var(--bg-2); }
table.tbl tr:last-child td { border-bottom: none; }
.num-cell { font-family: var(--mono); font-variant-numeric: tabular-nums; text-align: end; }
.empty-row { text-align:center; color: var(--ink-3); padding: 32px !important; font-style: italic; }

/* TAGS */
.tag { display:inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; background: var(--bg-2); color: var(--ink-2); }
.tag.green { background: #dcfce7; color: #166534; }
.tag.red { background: #fee2e2; color: #b91c1c; }
.tag.amber { background: #fef3c7; color: #92400e; }
.tag.blue { background: #dbeafe; color: #1e40af; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(26,20,16,0.5); backdrop-filter: blur(4px); display:flex; align-items:center; justify-content:center; z-index: 100; padding: 20px; }
.modal { background: var(--paper); border-radius: var(--radius-lg); width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
.modal.lg { max-width: 880px; }
.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
.modal-header h3 { font-family: var(--display); font-size: 20px; font-weight: 500; }
.modal-body { padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--line); display:flex; justify-content: flex-end; gap: 8px; }
.close-x { font-size: 24px; line-height: 1; color: var(--ink-3); padding: 4px 8px; }
.close-x:hover { color: var(--ink); }

/* GRID UTILITIES */
.row { display:flex; gap: 12px; }
.row.wrap { flex-wrap: wrap; }
.col { display:flex; flex-direction: column; gap: 12px; }
.grid { display:grid; gap: 12px; }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: repeat(3,1fr); }
.gap-sm { gap: 6px; } .gap-md { gap: 12px; } .gap-lg { gap: 20px; }

/* POS-SPECIFIC */
.pos-layout { display: grid; grid-template-columns: 1fr 380px; gap: 16px; height: calc(100vh - 48px); padding: 24px; }
.pos-products { display:flex; flex-direction:column; gap: 12px; min-height: 0; }
.cat-tabs { display:flex; gap:6px; overflow-x:auto; padding-bottom: 4px; }
.cat-tab { padding: 6px 14px; border-radius: 999px; background: white; border:1px solid var(--line); font-size: 13px; font-weight: 500; white-space: nowrap; transition: all 0.15s; }
.cat-tab:hover { border-color: var(--ink-3); }
.cat-tab.active { background: var(--ink); color: white; border-color: var(--ink); }

.product-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; overflow-y: auto; padding-right: 4px; }
.product-tile {
  background: var(--paper); border: 1px solid var(--line); border-radius: 12px;
  padding: 14px 12px; text-align: start; transition: all 0.12s;
  display:flex; flex-direction: column; gap: 4px;
  position: relative; overflow: hidden;
  min-height: 90px;
}
.product-tile:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--accent); }
.product-tile:active { transform: translateY(0); }
.product-tile .name { font-weight: 600; font-size: 13px; line-height: 1.25; }
.product-tile .price { font-family: var(--mono); font-size: 12px; color: var(--ink-2); margin-top: auto; }
.product-tile .stock-warn { position:absolute; top: 6px; right: 6px; font-size: 9px; padding: 2px 6px; border-radius: 999px; background: #fee2e2; color: #b91c1c; font-weight: 600; }
.product-tile .stock-warn.ok { background: #dcfce7; color: #166534; }
.product-tile.disabled { opacity: 0.4; pointer-events: none; }

/* CART */
.cart-panel {
  background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius-lg);
  display:flex; flex-direction: column; min-height: 0; overflow: hidden;
}
.cart-head { padding: 14px 16px; border-bottom: 1px solid var(--line); display:flex; justify-content: space-between; align-items: center; }
.cart-head h3 { font-family: var(--display); font-size: 17px; font-weight: 500; }
.order-mode-pills { display:flex; gap:4px; padding: 8px 16px; border-bottom: 1px solid var(--line); }
.order-pill { flex:1; padding: 6px 8px; border-radius: 6px; font-size: 11px; font-weight: 500; background: var(--bg-2); color: var(--ink-2); text-transform: uppercase; letter-spacing: 0.04em; }
.order-pill.active { background: var(--ink); color: white; }

.cart-items { flex: 1; overflow-y: auto; padding: 8px 12px; }
.cart-empty { text-align:center; color: var(--ink-3); padding: 40px 20px; font-style: italic; }
.cart-item { padding: 10px 8px; border-bottom: 1px dashed var(--line); display:flex; flex-direction: column; gap: 4px; }
.cart-item:last-child { border-bottom: none; }
.cart-item-top { display:flex; justify-content: space-between; gap: 8px; }
.cart-item-name { font-weight: 600; font-size: 13px; flex: 1; }
.cart-item-line-total { font-family: var(--mono); font-size: 13px; font-weight: 500; }
.cart-item-controls { display:flex; align-items:center; justify-content: space-between; gap: 8px; font-size: 12px; color: var(--ink-3); }
.qty-ctl { display:flex; align-items: center; gap: 6px; }
.qty-btn { width: 22px; height: 22px; border-radius: 6px; background: var(--bg-2); display:flex; align-items:center; justify-content:center; font-weight:600; font-size: 14px; }
.qty-btn:hover { background: var(--ink); color: white; }
.qty-num { font-family: var(--mono); font-weight: 600; min-width: 18px; text-align:center; }
.cart-rm { color: var(--bad); font-size: 11px; }

.cart-totals { padding: 12px 16px; border-top: 1px solid var(--line); background: var(--bg-2); }
.cart-line { display:flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
.cart-line.grand { font-family: var(--display); font-size: 22px; font-weight: 600; padding-top: 8px; border-top: 1px solid var(--line); margin-top: 4px; }
.cart-line .v { font-family: var(--mono); }

.cart-actions { padding: 12px 16px; display:grid; grid-template-columns: 1fr 1fr; gap: 8px; border-top: 1px solid var(--line); }
.cart-actions .btn-pay { grid-column: 1 / -1; padding: 14px; font-size: 15px; }

/* RECIPE BUILDER */
.recipe-row { display:grid; grid-template-columns: 2fr 1fr 80px 32px; gap: 8px; align-items:center; padding: 6px 0; }

/* P&L AND BS STYLE */
.fin-section { margin-bottom: 20px; }
.fin-section h4 { font-family: var(--display); font-size: 14px; font-weight: 600; color: var(--accent-2); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 2px solid var(--accent); }
.fin-row { display:flex; justify-content: space-between; padding: 5px 0; font-size: 13px; }
.fin-row.subtotal { border-top: 1px solid var(--line); padding-top: 8px; margin-top: 4px; font-weight: 600; }
.fin-row.total { border-top: 2px double var(--ink); padding-top: 8px; margin-top: 6px; font-family: var(--display); font-size: 15px; font-weight: 600; }
.fin-row .v { font-family: var(--mono); font-variant-numeric: tabular-nums; }
.fin-row.indent { padding-inline-start: 16px; color: var(--ink-2); }

/* RECEIPT MODAL */
.receipt {
  background: white; padding: 20px; border-radius: 8px;
  font-family: var(--mono); font-size: 12px; line-height: 1.5;
  max-width: 320px; margin: 0 auto;
  border: 1px dashed var(--line-2);
}
.receipt .hdr { text-align:center; border-bottom: 1px dashed #888; padding-bottom: 8px; margin-bottom: 8px; }
.receipt .hdr .name { font-family: var(--display); font-size: 18px; font-weight: 600; }
.receipt .row { display:flex; justify-content: space-between; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }

/* TOAST */
.toast-host { position: fixed; bottom: 20px; right: 20px; z-index: 200; display:flex; flex-direction: column; gap: 8px; }
body[dir="rtl"] .toast-host { right: auto; left: 20px; }
.toast { background: var(--ink); color: white; padding: 10px 16px; border-radius: 8px; box-shadow: var(--shadow-lg); font-size: 13px; font-weight: 500; min-width: 200px; animation: slideIn 0.2s ease-out; }
.toast.success { background: var(--good); }
.toast.error { background: var(--bad); }
@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.muted { color: var(--ink-3); }
.mono { font-family: var(--mono); }
.text-end { text-align: end; }
.flex-1 { flex: 1; }
.hidden { display: none !important; }

/* CHART STYLES */
.bar-chart { display:flex; align-items: flex-end; gap: 6px; height: 200px; padding: 12px 0; }
.bar { flex: 1; background: linear-gradient(180deg, var(--accent) 0%, var(--accent-2) 100%); border-radius: 4px 4px 0 0; position: relative; min-height: 4px; }
.bar:hover::after {
  content: attr(data-label);
  position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: white; padding: 4px 8px; border-radius: 4px;
  font-size: 11px; white-space: nowrap; margin-bottom: 4px;
}
.bar-labels { display:flex; gap: 6px; font-size: 10px; color: var(--ink-3); text-align:center; }
.bar-labels > span { flex: 1; }

/* TWO-COL FOR FORMS */
.form-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
.form-grid .full { grid-column: 1 / -1; }

/* LEDGER */
.ledger-pill { display:inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; background: var(--bg-2); color: var(--ink-2); margin-inline-end: 6px; }
.ledger-pill.dr { background:#dbeafe; color:#1e40af; }
.ledger-pill.cr { background:#dcfce7; color:#166534; }

/* LOCK SCREEN */
.lock-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(180deg, #0c1a2e 0%, #163152 60%, #1e4378 100%);
  display: grid; grid-template-columns: 1fr 1fr;
  color: #e8eef7; overflow: hidden;
}
.lock-left  { display:flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; overflow-y: auto; }
.lock-right { background-image: url('loginimage.png'); background-size: cover; background-position: center; }
@media (max-width: 900px) {
  .lock-screen { grid-template-columns: 1fr; }
  .lock-right  { display: none; }
}
.lock-card {
  background: transparent;
  border: none;
  border-radius: var(--radius-lg);
  padding: 0 8px;
  min-width: 320px; max-width: 92vw;
}
.lock-brand { text-align:center; margin-bottom: 26px; }
.lock-brand h1 {
  font-family: var(--display); font-weight: 600; font-size: 30px; letter-spacing: -0.01em;
  color: #fffdf8; display: inline-flex; align-items: center; gap: 10px;
}
.lock-brand .ldot { width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px rgba(194,65,12,0.6); }
.lock-brand .sub { font-size: 11px; color: #8ea4c2; margin-top: 4px; letter-spacing: 0.1em; text-transform: uppercase; }
.lock-title { font-family: var(--display); font-size: 18px; text-align:center; margin-bottom: 18px; color: #f3ede3; }
.user-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; }
.user-tile {
  background: rgba(255,253,248,0.06); border: 1px solid rgba(243,237,227,0.12);
  border-radius: var(--radius); padding: 16px 10px; text-align:center;
  transition: transform .15s, background .15s, border-color .15s;
  color: #f3ede3; cursor: pointer; font-family: inherit;
}
.user-tile:hover { background: rgba(194,65,12,0.20); border-color: var(--accent); transform: translateY(-2px); }
.user-avatar {
  width: 52px; height: 52px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
  color: white; font-family: var(--display); font-weight: 600; font-size: 22px;
  display:flex; align-items:center; justify-content:center; margin: 0 auto 10px;
}
.user-tile .u-name { font-size: 14px; font-weight: 500; }
.user-tile .u-role { font-size: 10px; color: #8ea4c2; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.06em; }
.lock-label { font-size: 11px; color: #8ea4c2; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; text-align: center; }
.lock-select {
  width: 100%; padding: 10px 36px; border-radius: 10px;
  background: rgba(255,253,248,0.08); color: #f3ede3;
  border: 1px solid rgba(243,237,227,0.18); font-size: 14px; font-family: inherit;
  font-weight: 600; text-align: center; text-align-last: center;
  outline: none; transition: border-color .15s, background .15s;
  appearance: none; -webkit-appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%238ea4c2' d='M6 8L0 0h12z'/></svg>");
  background-repeat: no-repeat; background-position: right 14px center;
}

/* -------------- DATA LAYER (DB abstraction) -----------------
   All reads/writes go through `db.*`. To upgrade to multi-terminal:
   replace these functions with fetch() calls to a local server.
   The store names + record shapes stay identical. */

const DB_NAME = 'brewbook_v1';
const DB_VERSION = 1;
const STORES = [
  'settings',         // { id:'app', currency, vatPct, shopName, ... }
  'categories',       // { id, name, sortOrder }
  'products',         // { id, sku, name, categoryId, price, taxable, recipe:[{materialId,qty,unit}], active }
  'materials',        // { id, sku, name, unit, costPerUnit, stock, reorderPoint, supplier }
  'suppliers',        // { id, name, phone, notes }
  'purchases',        // { id, date, supplierId, items:[{materialId,qty,unitCost}], total, paid, status }
  'expenses',         // { id, date, category, vendor, amount, notes, paidFromAccount }
  'orders',           // { id, num, date, mode, items:[{productId,name,price,qty,lineTotal,recipe}], subtotal, discount, vat, total, payment, cashier, status }
  'shifts',           // { id, openedAt, closedAt, openedBy, openingFloat, closingCash, expectedCash, variance }
  'stockMoves',       // { id, date, materialId, qty, type:'in'|'out'|'adjust'|'waste', refType, refId, costPerUnit }
  'journal',          // double-entry journal: { id, date, refType, refId, lines:[{account, dr, cr, memo}] }
  'accounts',         // chart of accounts: { id, code, name, type:'asset'|'liability'|'equity'|'revenue'|'expense', balance }
  'users',            // { id, name, role:'owner'|'manager'|'cashier', pin }
  'shops'             // { id, name, vat, address, phone, currency }
];

const db = (() => {
  let _db = null;
  function open() {
    return new Promise((res, rej) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = (e) => {
        const idb = e.target.result;
        STORES.forEach(s => {
          if (!idb.objectStoreNames.contains(s)) idb.createObjectStore(s, { keyPath: 'id' });
        });
      };
      req.onsuccess = (e) => { _db = e.target.result; res(_db); };
      req.onerror = (e) => rej(e.target.error);
    });
  }
  function tx(store, mode='readonly') { return _db.transaction(store, mode).objectStore(store); }
  return {
    init: open,
    getAll: (store) => new Promise((res, rej) => { const r = tx(store).getAll(); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }),
    get: (store, id) => new Promise((res, rej) => { const r = tx(store).get(id); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }),
    put: (store, obj) => new Promise((res, rej) => { const r = tx(store,'readwrite').put(obj); r.onsuccess=()=>res(obj); r.onerror=()=>rej(r.error); }),
    del: (store, id) => new Promise((res, rej) => { const r = tx(store,'readwrite').delete(id); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }),
    clear: (store) => new Promise((res, rej) => { const r = tx(store,'readwrite').clear(); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }),
    raw: () => _db
  };
})();

/* UNIT CONVERSION (for recipes) */
const UNIT_CONV = {
  // mass — base: g
  g: { base: 'g', factor: 1 },
  kg: { base: 'g', factor: 1000 },
  // volume — base: ml
  ml: { base: 'ml', factor: 1 },
  l: { base: 'ml', factor: 1000 },

  pc: { base: 'pc', factor: 1 },
  unit: { base: 'pc', factor: 1 },

function convertQty(qty, fromUnit, toUnit) {
  const f = UNIT_CONV[fromUnit], t2 = UNIT_CONV[toUnit];
  if (!f || !t2 || f.base !== t2.base) return null;
  return (qty * f.factor) / t2.factor;
}

/* TOAST */
function toast(msg, type='info') {
  const host = document.getElementById('toast-host');
  const el = document.createElement('div');
  el.className = 'toast ' + (type==='success'?'success':type==='error'?'error':'');
  el.textContent = msg;
  host.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity 0.2s'; setTimeout(()=>el.remove(), 200); }, 2400);
}

/* MODAL */
function modal(content, opts={}) {
  return new Promise((resolve) => {
    const host = document.getElementById('modal-host');
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal ${opts.large?'lg':''}">${content}</div>`;
    host.appendChild(overlay);
    overlay._resolve = resolve;
    overlay.addEventListener('click', (e) => { if (e.target===overlay && !opts.persistent) closeModal(false); });
  });
}
function closeModal(value=null) {
  const host = document.getElementById('modal-host');
  const overlay = host.lastElementChild;
  if (!overlay) return;
  overlay._resolve?.(value);
  overlay.remove();
}
window.closeModal = closeModal;
</script>
<script>
/* ============================================================
   PART 3.5  —  AUTH & SHIFTS
   PIN hashing, login (with terminal-level lockout), shift
   lifecycle (open, close with variance journal, void with
   manager auth, reopen), and the Z-report summary builder.
   ============================================================ */

async function hashPin(pin, salt) {
  const data = new TextEncoder().encode(String(salt) + String(pin));
  const buf = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function verifyPin(pin, user) {
  if (!user || !user.pinHash || !user.pinSalt) return false;
  return (await hashPin(pin, user.pinSalt)) === user.pinHash;
}

// Migrate any plaintext `pin` field on users to hashed pinHash + pinSalt.
async function migrateLegacyPins() {
  const users = await db.getAll('users');
  for (const u of users) {
    if (u.pin != null && !u.pinHash) {
      u.pinSalt = u.id;
      u.pinHash = await hashPin(String(u.pin), u.id);
      u.failedAttempts = 0;
      u.lockedUntil = null;
      delete u.pin;
      await db.put('users', u);
    }
  }
}

// Persist lockout across reloads (per-terminal, not per-user — see SPEC §4.1).
async function loadLockoutState() {
  const r = await db.get('settings', 'lockout');
  if (r) {
    State.loginAttempts = r.attempts || 0;
    State.lockoutUntil  = r.until ? new Date(r.until).getTime() : null;
  }
}
async function saveLockoutState() {
  await db.put('settings', {
    id: 'lockout',
    attempts: State.loginAttempts,
    until: State.lockoutUntil ? new Date(State.lockoutUntil).toISOString() : null,
  });
}

// login(pin) — iterates active users, returns the first whose hash matches.
// Throws { code:'locked', minutes } or { code:'wrong' }.
async function login(pin) {
  const cfg = (State.settings && State.settings.shiftConfig) || {};
  const maxAttempts = cfg.lockoutAttempts || 5;
  const lockMin = cfg.lockoutMinutes || 5;
  const now = Date.now();
  if (State.lockoutUntil && State.lockoutUntil > now) {
    const minutes = Math.ceil((State.lockoutUntil - now) / 60000);
    throw Object.assign(new Error('locked'), { code: 'locked', minutes });
  }
  const users = await db.getAll('users');
  for (const u of users) {
    if (await verifyPin(pin, u)) {
      State.loginAttempts = 0;
      State.lockoutUntil = null;
      await saveLockoutState();
      u.failedAttempts = 0;
      u.lockedUntil = null;
      u.lastLoginAt = nowISO();
      await db.put('users', u);
      return u;
    }
  }
  // No user matched
  State.loginAttempts++;
  if (State.loginAttempts >= maxAttempts) {
    State.lockoutUntil = now + lockMin * 60000;
    State.loginAttempts = 0;
  }
  await saveLockoutState();
  throw Object.assign(new Error('wrong'), { code: 'wrong' });
}

// Same lockout semantics as login(), but verifies against a specific picked user
// (used by the two-step lock screen where the cashier selects their tile first).
async function loginAs(user, pin) {
  const cfg = (State.settings && State.settings.shiftConfig) || {};
  const maxAttempts = cfg.lockoutAttempts || 5;
  const lockMin = cfg.lockoutMinutes || 5;
  const now = Date.now();
  if (State.lockoutUntil && State.lockoutUntil > now) {
    const minutes = Math.ceil((State.lockoutUntil - now) / 60000);
    throw Object.assign(new Error('locked'), { code: 'locked', minutes });
  }
  if (await verifyPin(pin, user)) {
    State.loginAttempts = 0;
    State.lockoutUntil = null;
    await saveLockoutState();
    user.failedAttempts = 0;
    user.lockedUntil = null;
    user.lastLoginAt = nowISO();
    await db.put('users', user);
    return user;
  }
  State.loginAttempts++;
  if (State.loginAttempts >= maxAttempts) {
    State.lockoutUntil = now + lockMin * 60000;
    State.loginAttempts = 0;
  }
  await saveLockoutState();
  throw Object.assign(new Error('wrong'), { code: 'wrong' });
}

/* -------------- SHIFT ENGINE -------------------------------- */

async function nextShiftNum() {
  const all = await db.getAll('shifts');
  return all.reduce((m, s) => Math.max(m, s.num || 0), 0) + 1;
}

async function getActiveShift() {
  const all = await db.getAll('shifts');
  return all.find(s => s.status === 'open' || s.status === 'reopened') || null;
}

async function openShift(cashierId, openingFloat, notes = '') {
  const existing = await getActiveShift();
  if (existing) throw new Error('A shift is already open');
  const shift = {
    id: uid(),
    num: await nextShiftNum(),
    cashierId,
    openedAt: nowISO(),
    closedAt: null,
    openingFloat: +openingFloat || 0,
    expectedCash: null,
    countedCash: null,
    variance: null,
    status: 'open',
    closedBy: null,
    notes: notes || '',
    zReportJson: null,
    reopenedAt: null,
    reopenedBy: null,
    reopenReason: null,
  };
  await db.put('shifts', shift);
  return shift;
}

// Build the Z-report data for a shift. Read live from DB.
async function getShiftSummary(shiftId) {
  const shift = await db.get('shifts', shiftId);
  if (!shift) throw new Error('Shift not found');
  const cashier = await db.get('users', shift.cashierId);

  const allOrders = await db.getAll('orders');
  const orders = allOrders.filter(o => o.shiftId === shiftId);
  const paid   = orders.filter(o => o.status === 'paid');
  const voided = orders.filter(o => o.status === 'voided');

  const totals = {
    orderCount: paid.length,
    voidedCount: voided.length,
    grossSales: 0,
    netSales: 0,
    discounts: 0,
    vat: 0,
    cogs: 0,
    refunds: 0,
  };
  const byPay = {
    cash:   { count: 0, gross: 0, refunds: 0, net: 0 },
    card:   { count: 0, gross: 0, refunds: 0, net: 0 },
    wallet: { count: 0, gross: 0, refunds: 0, net: 0 },
  };
  for (const o of paid) {
    totals.grossSales += o.total || 0;
    totals.netSales   += o.subtotal || 0;
    totals.discounts  += o.discount || 0;
    totals.vat        += o.vat || 0;
    totals.cogs       += o.cogs || 0;
    const m = (o.payment && o.payment.method) || 'cash';
    if (byPay[m]) { byPay[m].count++; byPay[m].gross += o.total || 0; }
  }
  for (const o of voided) {
    totals.refunds += o.total || 0;
    const m = (o.payment && o.payment.method) || 'cash';
    if (byPay[m]) byPay[m].refunds += o.total || 0;
  }
  for (const k of Object.keys(byPay)) byPay[k].net = byPay[k].gross - byPay[k].refunds;

  const cats = await db.getAll('categories');
  const products = await db.getAll('products');
  const catMap = Object.fromEntries(cats.map(c => [c.id, c.name]));
  const prodCat = Object.fromEntries(products.map(p => [p.id, p.categoryId]));
  const catAgg = {};
  const topAgg = {};
  for (const o of paid) {
    for (const it of (o.items || [])) {
      const cid = prodCat[it.productId] || 'other';
      const cname = catMap[cid] || 'Other';
      catAgg[cid] = catAgg[cid] || { categoryId: cid, categoryName: cname, qty: 0, revenue: 0 };
      catAgg[cid].qty += it.qty || 0;
      catAgg[cid].revenue += it.lineTotal || 0;
      topAgg[it.productId] = topAgg[it.productId] || { productId: it.productId, name: it.name, qty: 0, revenue: 0 };
      topAgg[it.productId].qty += it.qty || 0;
      topAgg[it.productId].revenue += it.lineTotal || 0;
    }
  }
  const byCategory = Object.values(catAgg).sort((a, b) => b.revenue - a.revenue);
  const topSellers = Object.values(topAgg).sort((a, b) => b.revenue - a.revenue).slice(0, 10);

  const userMap = Object.fromEntries((await db.getAll('users')).map(u => [u.id, u.name]));
  const voidsList = voided.map(o => ({
    num: o.num,
    voidedAt: o.voidedAt,
    total: o.total,
    reason: o.voidedReason || '',
    voidedByName: userMap[o.voidedBy] || '—',
    managerName: userMap[o.managerVoidId] || '—',
  })).sort((a, b) => (a.voidedAt || '').localeCompare(b.voidedAt || ''));

  return {
    shift: {
      id: shift.id,
      num: shift.num,
      openedAt: shift.openedAt,
      closedAt: shift.closedAt,
      openingFloat: shift.openingFloat,
      cashier: { id: cashier ? cashier.id : null, name: (cashier && cashier.name) || '—' },
      closedBy: shift.closedBy,
      notes: shift.notes,
    },
    totals,
    byPayment: byPay,
    byCategory,
    topSellers,
    voids: voidsList,
    cash: {
      openingFloat: shift.openingFloat || 0,
      expectedCash: (shift.openingFloat || 0) + byPay.cash.net,
      countedCash: shift.countedCash,
      variance: shift.variance,
    },
  };
}

async function closeShift(shiftId, countedCash, notes, closingUserId) {
  const shift = await db.get('shifts', shiftId);
  if (!shift) throw new Error('Shift not found');
  if (shift.status !== 'open' && shift.status !== 'reopened') throw new Error('Shift is not open');

  const summary = await getShiftSummary(shiftId);
  const expected = +(summary.cash.expectedCash || 0).toFixed(2);
  const counted = +(+countedCash || 0).toFixed(2);
  const variance = +(counted - expected).toFixed(2);

  // Mandatory variance journal — keeps books balanced.
  if (Math.abs(variance) >= 0.01) {
    const lines = variance < 0
      ? [
          { account: '6080', dr: Math.abs(variance), cr: 0, memo: `Shift #${shift.num} cash short` },
          { account: '1010', dr: 0, cr: Math.abs(variance), memo: `Shift #${shift.num} cash short` },
        ]
      : [
          { account: '1010', dr: variance, cr: 0, memo: `Shift #${shift.num} cash over` },
          { account: '6080', dr: 0, cr: variance, memo: `Shift #${shift.num} cash over` },
        ];
    await postJournal({
      refType: 'shift_close',
      refId: shift.id,
      memo: `Shift #${shift.num} cash variance`,
      lines,
    });
  }

  shift.closedAt = nowISO();
  shift.closedBy = closingUserId || null;
  shift.expectedCash = expected;
  shift.countedCash = counted;
  shift.variance = variance;
  shift.status = 'closed';
  if (notes) shift.notes = notes;
  shift.zReportJson = JSON.stringify({
    ...summary,
    shift: { ...summary.shift, closedAt: shift.closedAt, closedBy: shift.closedBy, notes: shift.notes },
    cash: { ...summary.cash, countedCash: counted, variance },
  });
  await db.put('shifts', shift);
  return shift;
}

async function voidOrder(orderId, reason, managerPin) {
  // 1. Verify the authorizing user. Settings.shiftConfig.requireMgrPin (default true)
  //    restricts authorization to manager/owner PINs.
  const cfg = (State.settings && State.settings.shiftConfig) || {};
  const requireMgr = cfg.requireMgrPin !== false;
  const users = await db.getAll('users');
  let manager = null;
  for (const u of users) {
    const allowed = requireMgr ? (u.role === 'manager' || u.role === 'owner') : true;
    if (allowed && await verifyPin(managerPin, u)) { manager = u; break; }
  }
  if (!manager) throw new Error('Manager PIN invalid');

  // 2. Load + validate the order.
  const order = await db.get('orders', orderId);
  if (!order) throw new Error('Order not found');
  if (order.status !== 'paid') throw new Error('Order is not paid (cannot void)');
  if (order.shiftId) {
    const sh = await db.get('shifts', order.shiftId);
    if (sh && sh.status === 'closed') throw new Error('Cannot void — shift is closed');
  }

  // 3. Reverse the journals.
  await reverseJournalForRef('order', order.id);
  await reverseJournalForRef('order_cogs', order.id);

  // 4. Restore stock — opposite move for each consumption.
  const moves = (await db.getAll('stockMoves')).filter(s => s.refType === 'order' && s.refId === order.id);
  for (const mv of moves) {
    await recordStockMove(mv.materialId, mv.qty, 'in', 'order_void', order.id, mv.costPerUnit);
  }

  // 5. Mark order voided (NEVER delete — audit trail).
  order.status = 'voided';
  order.voidedAt = nowISO();
  order.voidedBy = (State.cashier && State.cashier.id) || manager.id;
  order.voidedReason = reason || '';
  order.managerVoidId = manager.id;
  await db.put('orders', order);
  return order;
}

async function reopenShift(shiftId, reason, managerPin) {
  const users = await db.getAll('users');
  let manager = null;
  for (const u of users) {
    if ((u.role === 'manager' || u.role === 'owner') && await verifyPin(managerPin, u)) { manager = u; break; }
  }
  if (!manager) throw new Error('Manager PIN invalid');

  const shift = await db.get('shifts', shiftId);
  if (!shift) throw new Error('Shift not found');
  if (shift.status !== 'closed') throw new Error('Shift is not closed');

  const closedAt = new Date(shift.closedAt).getTime();
  if (Date.now() - closedAt > 24 * 3600 * 1000) throw new Error('Shift was closed more than 24h ago');

  // No newer shift may have closed after it.
  const all = (await db.getAll('shifts')).filter(s => s.id !== shift.id && s.closedAt);
  const newer = all.find(s => new Date(s.closedAt).getTime() > closedAt);
  if (newer) throw new Error('A newer shift was closed after this one');

  shift.status = 'reopened';
  shift.reopenedAt = nowISO();
  shift.reopenedBy = manager.id;
  shift.reopenReason = reason || '';
  await db.put('shifts', shift);
  return shift;
}

/* -------------- ACCOUNTING ENGINE --------------------------
   Double-entry bookkeeping. Every transaction (sale, purchase,
   expense, stock move) posts journal entries. P&L and Balance
   Sheet are computed from the journal in real time. */

const ACCOUNTS = [
  // Assets
  { id:'1010', code:'1010', name:'Cash on Hand', type:'asset' },
  { id:'1020', code:'1020', name:'Bank Account', type:'asset' },
  { id:'1030', code:'1030', name:'Accounts Receivable', type:'asset' },
  { id:'1100', code:'1100', name:'Inventory — Raw Materials', type:'asset' },
  { id:'1500', code:'1500', name:'Equipment & Fixtures', type:'asset' },
  { id:'1510', code:'1510', name:'Accumulated Depreciation', type:'asset', contra:true },
  // Liabilities
  { id:'2010', code:'2010', name:'Accounts Payable', type:'liability' },
  { id:'2020', code:'2020', name:'VAT Payable', type:'liability' },
  { id:'2030', code:'2030', name:'Accrued Expenses', type:'liability' },
  { id:'2100', code:'2100', name:'Loans Payable', type:'liability' },
  // Equity
  { id:'3010', code:'3010', name:"Owner's Capital", type:'equity' },
  { id:'3020', code:'3020', name:'Retained Earnings', type:'equity' },
  // Revenue
  { id:'4010', code:'4010', name:'Sales Revenue', type:'revenue' },
  { id:'4020', code:'4020', name:'Discounts Given', type:'revenue', contra:true },
  // Expenses
  { id:'5010', code:'5010', name:'Cost of Goods Sold', type:'expense' },
  { id:'5100', code:'5100', name:'Wastage & Spoilage', type:'expense' },
  { id:'6010', code:'6010', name:'Rent', type:'expense' },
  { id:'6020', code:'6020', name:'Salaries & Wages', type:'expense' },
  { id:'6030', code:'6030', name:'Utilities', type:'expense' },
  { id:'6040', code:'6040', name:'Marketing', type:'expense' },
  { id:'6050', code:'6050', name:'Supplies', type:'expense' },
  { id:'6060', code:'6060', name:'Maintenance', type:'expense' },
  { id:'6070', code:'6070', name:'Depreciation', type:'expense' },
  { id:'6080', code:'6080', name:'Other Expenses', type:'expense' },
];

async function postJournal(entry) {
  // entry: { date, refType, refId, memo, lines:[{account, dr, cr, memo}] }
  const totalDr = entry.lines.reduce((s,l)=>s+(l.dr||0),0);
  const totalCr = entry.lines.reduce((s,l)=>s+(l.cr||0),0);
  if (Math.abs(totalDr - totalCr) > 0.01) {
    console.error('Unbalanced journal!', entry, 'Dr:', totalDr, 'Cr:', totalCr);
    throw new Error('Journal entry not balanced');
  }
  const journalEntry = { id: uid(), date: entry.date || nowISO(), refType: entry.refType, refId: entry.refId, memo: entry.memo, lines: entry.lines };
  await db.put('journal', journalEntry);
  return journalEntry;
}

async function reverseJournalForRef(refType, refId) {
  const all = await db.getAll('journal');
  const matching = all.filter(j => j.refType === refType && j.refId === refId && !j.reversed);
  for (const j of matching) {
    const reversed = {
      id: uid(), date: nowISO(), refType: 'reverse_'+refType, refId: refId,
      memo: 'REVERSE: ' + (j.memo || ''),
      lines: j.lines.map(l => ({ account: l.account, dr: l.cr || 0, cr: l.dr || 0, memo: l.memo }))
    };
    j.reversed = true;
    await db.put('journal', j);
    await db.put('journal', reversed);
  }
}

async function getAccountBalance(accountId, asOfDate=null) {
  // Returns: dr-cr for assets/expenses (debit-normal); cr-dr for liabilities/equity/revenue (credit-normal)
  const acc = ACCOUNTS.find(a => a.id === accountId);
  if (!acc) return 0;
  const journal = await db.getAll('journal');
  let dr = 0, cr = 0;
  for (const j of journal) {
    if (asOfDate && j.date.slice(0,10) > asOfDate) continue;
    for (const l of j.lines) {
      if (l.account === accountId) { dr += l.dr || 0; cr += l.cr || 0; }
    }
  }
  const debitNormal = ['asset','expense'];
  const isContra = !!acc.contra;
  let bal = debitNormal.includes(acc.type) ? dr - cr : cr - dr;
  if (isContra) bal = -bal;
  return bal;
}

async function getPnL(fromDate, toDate) {
  const journal = await db.getAll('journal');
  const out = { revenue: {}, expense: {}, totalRevenue: 0, totalCogs: 0, totalOpex: 0, grossProfit: 0, netProfit: 0 };
  for (const j of journal) {
    const d = j.date.slice(0,10);
    if (fromDate && d < fromDate) continue;
    if (toDate && d > toDate) continue;
    for (const l of j.lines) {
      const acc = ACCOUNTS.find(a => a.id === l.account);
      if (!acc) continue;
      if (acc.type === 'revenue') {
        const amt = (l.cr||0) - (l.dr||0);
        const sign = acc.contra ? -amt : amt;
        out.revenue[acc.id] = (out.revenue[acc.id]||0) + sign;
      } else if (acc.type === 'expense') {
        const amt = (l.dr||0) - (l.cr||0);
        out.expense[acc.id] = (out.expense[acc.id]||0) + amt;
      }
    }
  }
  out.totalRevenue = Object.values(out.revenue).reduce((s,v)=>s+v,0);
  out.totalCogs = (out.expense['5010']||0) + (out.expense['5100']||0);
  out.totalOpex = Object.entries(out.expense).filter(([k]) => !['5010','5100'].includes(k)).reduce((s,[,v])=>s+v,0);
  out.grossProfit = out.totalRevenue - out.totalCogs;
  out.netProfit = out.grossProfit - out.totalOpex;
  return out;
}

async function getBalanceSheet(asOfDate=null) {
  const out = { asset: [], liability: [], equity: [], totalAssets: 0, totalLiabilities: 0, totalEquity: 0 };
  for (const acc of ACCOUNTS) {
    if (acc.type === 'revenue' || acc.type === 'expense') continue;
    const bal = await getAccountBalance(acc.id, asOfDate);
    if (Math.abs(bal) < 0.005 && acc.id !== '1010' && acc.id !== '3020') continue;
    out[acc.type].push({ ...acc, balance: bal });
  }
  // Compute retained earnings = cumulative net profit up to asOfDate
  const pnl = await getPnL(null, asOfDate);
  const retainedIdx = out.equity.findIndex(a => a.id === '3020');
  if (retainedIdx === -1) {
    out.equity.push({ id:'3020', code:'3020', name:'Retained Earnings', type:'equity', balance: pnl.netProfit });
  } else {
    out.equity[retainedIdx].balance += pnl.netProfit;
  }
  out.totalAssets = out.asset.reduce((s,a)=>s+a.balance,0);
  out.totalLiabilities = out.liability.reduce((s,a)=>s+a.balance,0);
  out.totalEquity = out.equity.reduce((s,a)=>s+a.balance,0);
  return out;
}

/* -------------- INVENTORY ENGINE --------------------------- */
async function recordStockMove(materialId, qty, type, refType, refId, costPerUnit=null) {
  // qty in material's own unit (positive number). type 'out' or 'waste' subtracts.
  const m = await db.get('materials', materialId);
  if (!m) return null;
  const sign = (type==='in' || (type==='adjust' && qty>0)) ? 1 : -1;
  const delta = Math.abs(qty) * sign;
  m.stock = (m.stock || 0) + delta;
  await db.put('materials', m);
  const move = { id: uid(), date: nowISO(), materialId, qty: Math.abs(qty), type, refType, refId, costPerUnit: costPerUnit ?? m.costPerUnit, signedDelta: delta };
  await db.put('stockMoves', move);
  return move;
}

async function consumeRecipeForOrder(order) {
  // For each line item, drill into product.recipe, convert units, deduct from materials,
  // and accumulate COGS. Returns total COGS for the order.
  let totalCogs = 0;
  for (const line of order.items) {
    const product = await db.get('products', line.productId);
    if (!product || !product.recipe) continue;
    for (const ing of product.recipe) {
      const m = await db.get('materials', ing.materialId);
      if (!m) continue;
      const qtyInMaterialUnit = convertQty(ing.qty, ing.unit, m.unit);
      if (qtyInMaterialUnit == null) continue;
      const totalConsumed = qtyInMaterialUnit * line.qty;
      // record stock out
      await recordStockMove(ing.materialId, totalConsumed, 'out', 'order', order.id, m.costPerUnit);
      totalCogs += totalConsumed * (m.costPerUnit || 0);
    }
  }
  return totalCogs;
}

/* -------------- ORDER POSTING (the special feature) --------
   When an order is paid, this function:
   1. Deducts each recipe component from inventory
   2. Calculates COGS automatically
   3. Posts journal entries: Cash Dr / Sales Cr / VAT Cr, COGS Dr / Inventory Cr
*/
async function finalizeOrder(orderDraft, payment) {
  if (!State.activeShift) throw new Error('No active shift — open a shift before taking orders');
  const order = {
    ...orderDraft,
    id: uid(),
    num: await nextOrderNum(),
    date: nowISO(),
    payment, // { method, amountPaid, change }
    status: 'paid',
    cashier: State.cashier?.id,
    shiftId: State.activeShift.id,
  };
  // 1. Save order
  await db.put('orders', order);
  // 2. Consume inventory & compute COGS
  const cogs = await consumeRecipeForOrder(order);
  order.cogs = cogs;
  await db.put('orders', order);
  // 3. Journal entries
  const cashAcct = payment.method === 'cash' ? '1010' : '1020'; // bank for card
  const lines = [];
  // Cash/Bank Dr (full amount)
  lines.push({ account: cashAcct, dr: order.total, cr: 0, memo: `Order #${order.num}` });
  // Sales Revenue Cr (subtotal - discount)
  lines.push({ account: '4010', dr: 0, cr: order.subtotal, memo: `Order #${order.num} sales` });
  if (order.discount > 0) {
    lines.push({ account: '4020', dr: order.discount, cr: 0, memo: `Order #${order.num} discount` });
  }
  // VAT Payable Cr
  if (order.vat > 0) {
    lines.push({ account: '2020', dr: 0, cr: order.vat, memo: `Order #${order.num} VAT` });
  }
  await postJournal({ refType: 'order', refId: order.id, memo: `Sale #${order.num}`, lines });
  // 4. COGS journal
  if (cogs > 0) {
    await postJournal({
      refType: 'order_cogs', refId: order.id, memo: `COGS for #${order.num}`,
      lines: [
        { account: '5010', dr: cogs, cr: 0, memo: 'COGS' },
        { account: '1100', dr: 0, cr: cogs, memo: 'Inventory consumed' },
      ]
    });
  }
  return order;
}

async function nextOrderNum() {
  const all = await db.getAll('orders');
  const max = all.reduce((m,o) => Math.max(m, o.num || 0), 0);
  return max + 1;
}

/* -------------- PURCHASE POSTING --------------------------- */
async function finalizePurchase(po) {
  // po: { supplierId, date, items:[{materialId, qty, unitCost}], paid (bool) }
  const purchase = { ...po, id: po.id || uid(), status: po.paid ? 'paid' : 'unpaid' };
  let total = 0;
  for (const it of po.items) {
    total += it.qty * it.unitCost;
    // increase stock; update weighted-avg cost
    const m = await db.get('materials', it.materialId);
    if (!m) continue;
    const oldVal = (m.stock||0) * (m.costPerUnit||0);
    const newVal = it.qty * it.unitCost;
    const newStock = (m.stock||0) + it.qty;
    m.costPerUnit = newStock > 0 ? (oldVal + newVal) / newStock : it.unitCost;
    m.stock = newStock;
    await db.put('materials', m);
    await db.put('stockMoves', { id: uid(), date: purchase.date, materialId: it.materialId, qty: it.qty, type:'in', refType:'purchase', refId: purchase.id, costPerUnit: it.unitCost, signedDelta: it.qty });
  }
  purchase.total = total;
  await db.put('purchases', purchase);
  // journal: Inventory Dr / Cash or AP Cr
  const credit = po.paid ? '1010' : '2010';
  await postJournal({
    refType: 'purchase', refId: purchase.id, memo: `Purchase from supplier`,
    lines: [
      { account: '1100', dr: total, cr: 0, memo: 'Inventory in' },
      { account: credit, dr: 0, cr: total, memo: po.paid ? 'Paid cash' : 'On account' },
    ]
  });
  return purchase;
}

/* -------------- EXPENSE POSTING ---------------------------- */
async function finalizeExpense(expense) {
  const e = { ...expense, id: expense.id || uid() };
  await db.put('expenses', e);
  const credit = e.paidFromAccount || '1010'; // cash by default
  await postJournal({
    refType: 'expense', refId: e.id, memo: `Expense: ${e.category}`,
    lines: [
      { account: e.category, dr: e.amount, cr: 0, memo: e.notes || '' },
      { account: credit, dr: 0, cr: e.amount, memo: e.vendor || '' },
    ]
  });
  return e;
}

      </div>
      <div class="lock-right"></div>`;

    const sel = overlay.querySelector('#lock-user');
    if (sel) sel.onchange = () => {
      picked = users.find(u => u.id === sel.value) || null;
      pin = ''; errored = false; errorMsg = ''; draw();
    };
    overlay.querySelectorAll('.key[data-n]').forEach(k => k.onclick = () => press(k.dataset.n));
  };

  const press = async (n) => {
    if (n === 'del') { pin = pin.slice(0, -1); errored = false; draw(); return; }
    if (n === 'ok')  { return submit(); }
    if (pin.length >= 6) return;
    errored = false;
    pin += String(n);
    draw();
  };

  const submit = async () => {
    if (!picked) return;
    if (pin.length < 4) { errored = true; errorMsg = t('pinFourDigits'); draw(); return; }
    try {
      const user = await loginAs(picked, pin);
      cleanup();
      resolver(user);
    } catch (err) {
      if (err.code === 'locked') {
        errored = true; errorMsg = t('accountLocked').replace('{n}', String(err.minutes));
      } else {
        errored = true; errorMsg = t('wrongPin');
      }
      pin = '';
      draw();
    }
  };

  const onKey = (e) => {
    if (e.target && (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT')) return;
    if (e.key >= '0' && e.key <= '9') press(e.key);
    else if (e.key === 'Backspace') { e.preventDefault(); press('del'); }
    else if (e.key === 'Enter')     { e.preventDefault(); press('ok'); }
  };
  window.addEventListener('keydown', onKey);

  function cleanup() {
    window.removeEventListener('keydown', onKey);
    overlay.remove();
  }

  draw();
  return promise;
}

// One-shot login that drops the user into a usable state.
// Returns once a shift is open (or skipped by manager/owner).
async function authAndShiftFlow() {
  while (true) {
    const user = await renderLockScreen();
    State.cashier = user;

    const active = await getActiveShift();
    if (active && active.cashierId === user.id) {
      State.activeShift = active;
      return;
    }
    if (active) {
      const owner = await db.get('users', active.cashierId);
      if (user.role === 'manager' || user.role === 'owner') {
        // Allow manager/owner to navigate without their own shift; they manage from Reports → Shifts.
        State.activeShift = null;
        toast(t('foreignShiftManager').replace('{name}', owner?.name || '—'), 'info');
        return;
      }
      // Cashier with a foreign open shift: deny.
      toast(t('foreignShiftCashier').replace('{name}', owner?.name || '—'), 'error');
      State.cashier = null;
      continue;
    }
    // No active shift. Show the open-shift modal.
    const result = await openShiftModal(user);
    if (result === 'opened' || result === 'skipped') return;
    State.cashier = null; // logout, back to lock screen
  }
}

async function lockApp() {
  State.cashier = null;
  State.activeShift = null;
  renderSidebar();
  await authAndShiftFlow();
  renderSidebar();
  navigate('pos');
}
window.lockApp = lockApp;

/* -------------- CLOSE SHIFT FLOW ----------------------------- */
async function startCloseShiftFlow(shiftId, closingUserId) {
  const shift = await db.get('shifts', shiftId);
  if (!shift) { toast('Shift not found','error'); return false; }
  const summary = await getShiftSummary(shiftId);
  const cfg = State.settings.shiftConfig || {};
  let revealExpected = !cfg.hideExpected;
  let counted = '';

  return new Promise((resolve) => {
    const host = document.getElementById('modal-host');
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal" style="max-width:520px" id="close-shift-modal"></div>`;
    host.appendChild(overlay);

    const drawStep1 = () => {
      const expected = summary.cash.expectedCash;
      overlay.querySelector('#close-shift-modal').innerHTML = `
        <div class="modal-header">
          <h3>${t('closeShift')} #${shift.num}</h3>
          <button class="close-x" id="cs-close-x">×</button>
        </div>
        <div class="modal-body">
          <div class="cash-count-grid">
            <div class="lbl">${t('openingFloat')}</div>
            <div class="val">${fmt(summary.cash.openingFloat)}</div>
            <div class="lbl">${t('cashSales')} (net)</div>
            <div class="val">+ ${fmt(summary.byPayment.cash.net)}</div>
            <div class="lbl total row-h">${t('expectedInDrawer')}</div>
            <div class="val total row-h">${revealExpected ? fmt(expected) : '— — —'}</div>
          </div>
          ${cfg.hideExpected ? `<div style="margin:8px 0;text-align:end"><button class="btn btn-sm" id="cs-reveal">${revealExpected ? t('hideExpectedShort') : t('revealExpected')}</button></div>` : ''}
          <div class="field full" style="margin-top:14px">
            <label>${t('countedCash')} (${State.settings.currency})</label>
            <input class="input" type="number" id="cs-counted" inputmode="decimal" step="0.01" value="${counted}" autofocus />
          </div>
          <div class="field full">
            <label>${t('notesOptional')}</label>
            <input class="input" id="cs-notes" value="${shift.notes||''}" />
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn" id="cs-cancel">${t('cancel')}</button>
          <button class="btn btn-primary" id="cs-next">${t('confirm')} →</button>
        </div>`;
      const inp = overlay.querySelector('#cs-counted');
      inp.oninput = () => { counted = inp.value; };
      inp.focus(); inp.select();
      overlay.querySelector('#cs-close-x').onclick = () => { overlay.remove(); resolve(false); };
      overlay.querySelector('#cs-cancel').onclick   = () => { overlay.remove(); resolve(false); };
      const reveal = overlay.querySelector('#cs-reveal');
      if (reveal) reveal.onclick = () => { revealExpected = !revealExpected; drawStep1(); };
      overlay.querySelector('#cs-next').onclick = () => {
        if (counted === '' || isNaN(+counted)) { toast(t('countedCash')+' '+'required','error'); return; }
        drawStep2();
      };
    };

    const drawStep2 = () => {
      const expected = summary.cash.expectedCash;
      const c = +counted;
      const variance = +(c - expected).toFixed(2);
      const cls = Math.abs(variance) < 0.01 ? 'ok' : variance < 0 ? 'short' : 'over';
      const label = Math.abs(variance) < 0.01 ? '' : variance < 0 ? ` (${t('short')})` : ` (${t('over')})`;
      overlay.querySelector('#close-shift-modal').innerHTML = `
        <div class="modal-header"><h3>${t('confirm')} — ${t('shift')} #${shift.num}</h3></div>
        <div class="modal-body">
          <div class="cash-count-grid">
            <div class="lbl">${t('countedCash')}</div><div class="val">${fmt(c)}</div>
            <div class="lbl">${t('expectedInDrawer')}</div><div class="val">${fmt(expected)}</div>
            <div class="lbl total row-h">${t('variance')}</div>
            <div class="val total row-h"><span class="variance-pill ${cls}">${variance>0?'+':''}${fmt(variance)}${label}</span></div>
          </div>
          <p class="muted" style="margin-top:14px;font-size:13px;">${t('confirmCloseShift')}</p>
        </div>
        <div class="modal-footer">
          <button class="btn" id="cs-back">← ${t('back')}</button>
          <button class="btn btn-primary" id="cs-confirm">${t('closeAndPrint')}</button>
        </div>`;
      overlay.querySelector('#cs-back').onclick = drawStep1;
      overlay.querySelector('#cs-confirm').onclick = async () => {
        try {
          const notes = document.getElementById('cs-notes')?.value || shift.notes;
          await closeShift(shift.id, c, notes, closingUserId);
          overlay.remove();
          State.zReportShiftId = shift.id;
          if (State.activeShift && State.activeShift.id === shift.id) State.activeShift = null;
          await navigate('zreport');
          // Auto-print after a short delay so layout settles.
          setTimeout(() => window.print(), 250);
          resolve(true);
        } catch (err) {
          toast(err.message, 'error');
        }
      };
    };

    drawStep1();
  });
}
