function renderProductGrid() {
  const grid = document.getElementById('product-grid');
  const products = State.products.filter(p => p.active && p.categoryId === State.selectedCat);
  if (products.length === 0) {
    grid.innerHTML = `<div class="muted" style="grid-column:1/-1;text-align:center;padding:40px;">No products in this category. Add one in Products.</div>`;
    return;
  }
  grid.innerHTML = products.map(p => {
    const stockOk = canMake(p);
    return `
    <button class="product-tile ${stockOk?'':'disabled'}" data-id="${p.id}">
      ${stockOk ? '' : '<span class="stock-warn">Out of stock</span>'}
      <div class="name">${p.name}</div>
      <div class="price">${fmt(p.price)}</div>
    </button>`;
  }).join('');
  grid.querySelectorAll('.product-tile').forEach(b => {
    b.onclick = () => addToCart(b.dataset.id);
  });
}

function canMake(product, qty=1) {
  if (!product.recipe || product.recipe.length === 0) return true;
  for (const ing of product.recipe) {
    const m = State.materials.find(x => x.id === ing.materialId);
    if (!m) continue;
    const needInMaterialUnit = (convertQty(ing.qty, ing.unit, m.unit) || 0) * qty;
    if (m.stock < needInMaterialUnit) return false;
  }
  return true;
}

function addToCart(productId) {
  const product = State.products.find(p => p.id === productId);
  if (!product) return;
  const existing = State.cart.find(i => i.productId === productId);
  if (existing) {
    if (!canMake(product, existing.qty + 1)) { toast('Insufficient inventory', 'error'); return; }
    existing.qty += 1;
    existing.lineTotal = existing.qty * existing.price;
  } else {
    State.cart.push({
      productId: product.id, name: product.name, price: product.price,
      qty: 1, lineTotal: product.price, taxable: product.taxable !== false
    });
  }
  renderCart();
  updatePayButton();
}

function renderCart() {
  const items = document.getElementById('cart-items');
  const totals = document.getElementById('cart-totals');
  if (!items) return;
  if (State.cart.length === 0) {
    items.innerHTML = `<div class="cart-empty">Tap a product to start an order</div>`;
  } else {
    items.innerHTML = State.cart.map((it, idx) => `
      <div class="cart-item">
        <div class="cart-item-top">
          <div class="cart-item-name">${it.name}</div>
          <div class="cart-item-line-total mono">${fmt(it.lineTotal)}</div>
        </div>
        <div class="cart-item-controls">
          <span class="muted">${fmt(it.price)} ×</span>
          <div class="qty-ctl">
            <button class="qty-btn" data-act="dec" data-idx="${idx}">−</button>
            <span class="qty-num">${it.qty}</span>
            <button class="qty-btn" data-act="inc" data-idx="${idx}">+</button>
          </div>
          <button class="cart-rm" data-act="rm" data-idx="${idx}">Remove</button>
        </div>
      </div>
    `).join('');
    items.querySelectorAll('button').forEach(b => {
      b.onclick = () => {
        const idx = +b.dataset.idx;
        const it = State.cart[idx];
        const product = State.products.find(p => p.id === it.productId);
        if (b.dataset.act === 'inc') {
          if (!canMake(product, it.qty + 1)) { toast('Insufficient inventory', 'error'); return; }
          it.qty += 1; it.lineTotal = it.qty * it.price;
        }
        else if (b.dataset.act === 'dec') { if (it.qty>1) { it.qty -= 1; it.lineTotal = it.qty * it.price; } else State.cart.splice(idx,1); }
        else if (b.dataset.act === 'rm') State.cart.splice(idx,1);
        renderCart(); updatePayButton();
      };
    });
  }
  // Totals
  const t2 = computeCartTotals();
  totals.innerHTML = `
    <div class="cart-line"><span>Subtotal</span><span class="v mono">${fmt(t2.subtotal)}</span></div>
    ${t2.discount > 0 ? `<div class="cart-line"><span>Discount${State.cartDiscount.type==='percent'?` (${State.cartDiscount.value}%)`:''}</span><span class="v mono">−${fmt(t2.discount)}</span></div>` : ''}
    <div class="cart-line"><span>VAT (${State.settings.vatPct}%)</span><span class="v mono">${fmt(t2.vat)}</span></div>
    <div class="cart-line grand"><span>Total</span><span class="v">${fmt(t2.total)}</span></div>
  `;
}

function computeCartTotals() {
  const subtotal = State.cart.reduce((s,i) => s + i.lineTotal, 0);
  let discount = 0;
  if (State.cartDiscount.type === 'percent') discount = subtotal * (State.cartDiscount.value/100);
  else discount = Math.min(State.cartDiscount.value, subtotal);
  const taxableBase = subtotal - discount;
  const vat = taxableBase * (State.settings.vatPct/100);
  const total = taxableBase + vat;
  return { subtotal, discount, vat, total };
}

function updatePayButton() {
  const btn = document.getElementById('pay-btn');
  if (!btn) return;
  const { total } = computeCartTotals();
  const hasShift = !!State.activeShift;
  btn.textContent = hasShift ? `Charge ${fmt(total)}` : t('openShift');
  btn.disabled = State.cart.length === 0 || !hasShift;
  btn.style.opacity = (State.cart.length && hasShift) ? 1 : 0.5;
}

const CASHIER_MAX_DISCOUNT_PCT = 5;

async function openDiscountModal() {
  const isCashier = State.cashier?.role === 'cashier';
  // Cashiers are limited to a percent discount at most CASHIER_MAX_DISCOUNT_PCT.
  // If their saved cart discount somehow exceeds it (e.g. role changed), clamp the
  // value shown in the field so they can't reapply a higher number.
  const initialType = isCashier ? 'percent' : State.cartDiscount.type;
  const initialValue = (isCashier && State.cartDiscount.type === 'percent')
    ? Math.min(State.cartDiscount.value, CASHIER_MAX_DISCOUNT_PCT)
    : (isCashier ? 0 : State.cartDiscount.value);
  modal(`
    <div class="modal-header"><h3>Apply Discount</h3><button class="close-x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field">
          <label>Discount Type</label>
          <select class="input" id="d-type" ${isCashier?'disabled':''}>
            <option value="percent" ${initialType==='percent'?'selected':''}>Percentage (%)</option>
            <option value="amount" ${initialType==='amount'?'selected':''} ${isCashier?'disabled':''}>Fixed Amount</option>
          </select>
        </div>
        <div class="field">
          <label>Value${isCashier?` (max ${CASHIER_MAX_DISCOUNT_PCT}%)`:''}</label>
          <input class="input" type="number" id="d-val" value="${initialValue}" min="0" step="0.01" ${isCashier?`max="${CASHIER_MAX_DISCOUNT_PCT}"`:''} />
        </div>
      </div>
      ${isCashier?`<p class="muted" style="font-size:12px;margin-top:10px;">Cashiers may apply up to ${CASHIER_MAX_DISCOUNT_PCT}%. For larger discounts, ask a manager.</p>`:''}
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="d-apply">Apply</button>
    </div>
  `);
  document.getElementById('d-apply').onclick = () => {
    const type = document.getElementById('d-type').value;
    const value = +document.getElementById('d-val').value || 0;
    if (isCashier) {
      if (type !== 'percent') { toast(`Cashiers can only apply percentage discounts (max ${CASHIER_MAX_DISCOUNT_PCT}%)`, 'error'); return; }
      if (value > CASHIER_MAX_DISCOUNT_PCT) { toast(`Cashier discount limit is ${CASHIER_MAX_DISCOUNT_PCT}%`, 'error'); return; }
    }
    State.cartDiscount = { type, value };
    closeModal();
    renderCart(); updatePayButton();
  };
}

async function openPayModal() {
  if (State.cart.length === 0) return;
  const t2 = computeCartTotals();
  modal(`
    <div class="modal-header"><h3>Charge ${fmt(t2.total)}</h3><button class="close-x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field">
          <label>Payment Method</label>
          <select class="input" id="pay-method">
            <option value="cash">Cash</option>
            <option value="card">Card</option>
            <option value="wallet">Mobile Wallet</option>
          </select>
        </div>
        <div class="field">
          <label>Amount Tendered</label>
          <input class="input" type="number" id="pay-amount" value="${t2.total.toFixed(2)}" min="0" step="0.01" />
        </div>
        <div class="field full">
          <label>Change</label>
          <div style="font-family:var(--display);font-size:24px;font-weight:600;" id="change-display">${fmt(0)}</div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-accent btn-lg" id="confirm-pay">Confirm & Print Receipt</button>
    </div>
  `);
  const updateChange = () => {
    const amt = +document.getElementById('pay-amount').value || 0;
    const change = Math.max(0, amt - t2.total);
    document.getElementById('change-display').textContent = fmt(change);
  };
  document.getElementById('pay-amount').oninput = updateChange;
  document.getElementById('pay-method').onchange = (e) => {
    if (e.target.value !== 'cash') {
      document.getElementById('pay-amount').value = t2.total.toFixed(2);
      updateChange();
    }
  };
  document.getElementById('confirm-pay').onclick = async () => {
    const method = document.getElementById('pay-method').value;
    const amount = +document.getElementById('pay-amount').value || 0;
    if (method==='cash' && amount < t2.total) { toast('Amount tendered is less than total', 'error'); return; }
    const orderDraft = {
      mode: State.orderMode,
      items: State.cart.map(i => ({...i})),
      subtotal: t2.subtotal,
      discount: t2.discount,
      vat: t2.vat,
      total: t2.total,
    };
    try {
      const order = await finalizeOrder(orderDraft, { method, amountPaid: amount, change: amount - t2.total });
      State.cart = []; State.cartDiscount = {type:'percent', value:0};
      await reloadState();
      closeModal();
      await openReceiptModal(order);
      navigate('pos');
    } catch (err) {
      console.error(err); toast('Order failed: ' + err.message, 'error');
    }
  };
}

async function openReceiptModal(order) {
  const s = State.settings;
  const itemsHtml = order.items.map(i => `
    <div class="row"><span>${i.qty}× ${i.name}</span><span>${fmtNum(i.lineTotal)}</span></div>
  `).join('');
  modal(`
    <div class="modal-header"><h3>Receipt — Order #${order.num}</h3><button class="close-x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="receipt" id="receipt-print">
        <div class="hdr">
          <div class="name">${s.shopName}</div>
          <div>${s.address || ''}</div>
          <div>${s.phone || ''}</div>
          ${s.taxId ? `<div>Tax ID: ${s.taxId}</div>` : ''}
        </div>
        <div class="row"><span>Order #${order.num}</span><span>${new Date(order.date).toLocaleString()}</span></div>
        <div class="row"><span>Mode: ${order.mode}</span><span>Cashier: ${State.cashier?.name||''}</span></div>
        <div style="border-top:1px dashed #888;margin:8px 0;"></div>
        ${itemsHtml}
        <div style="border-top:1px dashed #888;margin:8px 0;"></div>
        <div class="row"><span>Subtotal</span><span>${fmtNum(order.subtotal)}</span></div>
        ${order.discount>0?`<div class="row"><span>Discount</span><span>−${fmtNum(order.discount)}</span></div>`:''}
        <div class="row"><span>VAT ${s.vatPct}%</span><span>${fmtNum(order.vat)}</span></div>
        <div class="row" style="font-weight:bold;font-size:14px;border-top:1px solid #000;padding-top:4px;margin-top:4px;"><span>TOTAL</span><span>${fmt(order.total)}</span></div>
        <div class="row" style="margin-top:6px;"><span>${order.payment.method.toUpperCase()}</span><span>${fmtNum(order.payment.amountPaid)}</span></div>
        ${order.payment.change>0?`<div class="row"><span>Change</span><span>${fmtNum(order.payment.change)}</span></div>`:''}
        <div style="text-align:center;margin-top:12px;font-size:11px;">${s.receiptFooter || ''}</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="window.print()">Print</button>
      <button class="btn btn-primary" onclick="closeModal()">Done</button>
    </div>
  `, {large:false});
}
</script>
<script>
/* ============================================================
   PRODUCTS
   ============================================================ */
async function renderProducts(main) {
  const cats = State.categories;
  main.innerHTML = `
    <div class="page">
      <div class="page-header">
        <div>
          <div class="page-title">Products</div>
          <div class="page-subtitle">Menu items sold through POS. Each can be linked to a recipe of raw materials.</div>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" id="add-product">+ New Product</button>
        </div>
      </div>
      <div class="card">
        <table class="tbl">
          <thead><tr><th>SKU</th><th>Name</th><th>Category</th><th class="text-end">Price</th><th class="text-end">Recipe Cost</th><th class="text-end">Margin</th><th>Status</th><th></th></tr></thead>
          <tbody id="prod-rows"></tbody>
        </table>
      </div>
    </div>
  `;
  document.getElementById('add-product').onclick = () => productEditor(null);
  refreshProductRows();
}

async function refreshProductRows() {
  const tbody = document.getElementById('prod-rows');
  if (!tbody) return;
  const products = State.products.sort((a,b)=>a.sku.localeCompare(b.sku));
  if (products.length===0) {
    tbody.innerHTML = `<tr><td colspan="8" class="empty-row">No products yet</td></tr>`;
    return;
  }
  tbody.innerHTML = products.map(p => {
    const cat = State.categories.find(c => c.id === p.categoryId)?.name || '—';
    const cost = recipeCost(p);
    const margin = p.price > 0 ? ((p.price - cost) / p.price * 100) : 0;
    return `
      <tr>
        <td class="mono">${p.sku}</td>
        <td><strong>${p.name}</strong></td>
        <td>${cat}</td>
        <td class="num-cell">${fmt(p.price)}</td>
        <td class="num-cell">${fmt(cost)}</td>
        <td class="num-cell"><span class="tag ${margin>50?'green':margin>20?'amber':'red'}">${margin.toFixed(1)}%</span></td>
        <td>${p.active ? '<span class="tag green">Active</span>' : '<span class="tag">Inactive</span>'}</td>
        <td class="text-end">
          <button class="btn btn-sm" data-id="${p.id}" data-act="edit">Edit</button>
          <button class="btn btn-sm" data-id="${p.id}" data-act="recipe">Recipe</button>
        </td>
      </tr>
    `;
  }).join('');
  tbody.querySelectorAll('button').forEach(b => {
    b.onclick = () => {
      const p = State.products.find(x => x.id === b.dataset.id);
      if (b.dataset.act==='edit') productEditor(p);
      else if (b.dataset.act==='recipe') recipeEditor(p);
    };
  });
}

function recipeCost(product) {
  if (!product.recipe) return 0;
  let cost = 0;
  for (const ing of product.recipe) {
    const m = State.materials.find(x => x.id === ing.materialId);
    if (!m) continue;
    const qtyInM = convertQty(ing.qty, ing.unit, m.unit);
    if (qtyInM == null) continue;
    cost += qtyInM * (m.costPerUnit||0);
  }
  return cost;
}

async function productEditor(product) {
  const isNew = !product;
  const p = product || { id: uid(), sku:'', name:'', categoryId: State.categories[0]?.id || '', price:0, taxable:true, active:true, recipe:[] };
  modal(`
    <div class="modal-header"><h3>${isNew?'New':'Edit'} Product</h3><button class="close-x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field"><label>SKU</label><input class="input" id="p-sku" value="${p.sku}" /></div>
        <div class="field"><label>Name</label><input class="input" id="p-name" value="${p.name}" /></div>
        <div class="field">
          <label>Category</label>
          <select class="input" id="p-cat">
            ${State.categories.map(c => `<option value="${c.id}" ${c.id===p.categoryId?'selected':''}>${c.name}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Price</label><input class="input" type="number" step="0.01" id="p-price" value="${p.price}" /></div>
        <div class="field"><label>Taxable</label><select class="input" id="p-tax"><option value="1" ${p.taxable!==false?'selected':''}>Yes</option><option value="0" ${p.taxable===false?'selected':''}>No</option></select></div>
        <div class="field"><label>Active</label><select class="input" id="p-active"><option value="1" ${p.active!==false?'selected':''}>Yes</option><option value="0" ${p.active===false?'selected':''}>No</option></select></div>
      </div>
    </div>
    <div class="modal-footer">
      ${!isNew?`<button class="btn btn-danger" id="p-del">Delete</button>`:''}
      <div style="flex:1"></div>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="p-save">Save</button>
    </div>
  `);
  document.getElementById('p-save').onclick = async () => {
    const updated = {
      ...p,
      sku: document.getElementById('p-sku').value.trim(),
      name: document.getElementById('p-name').value.trim(),
      categoryId: document.getElementById('p-cat').value,
      price: +document.getElementById('p-price').value || 0,
      taxable: document.getElementById('p-tax').value === '1',
      active: document.getElementById('p-active').value === '1',
    };
    if (!updated.name) { toast('Name required','error'); return; }
    await db.put('products', updated);
    await reloadState();
    closeModal();
    refreshProductRows();
    toast('Saved', 'success');
  };
  if (!isNew) {
    document.getElementById('p-del').onclick = async () => {
      if (!confirm('Delete this product?')) return;
      await db.del('products', p.id);
      await reloadState();
      closeModal(); refreshProductRows();
      toast('Deleted', 'success');
    };
  }
}

/* ============================================================
   RECIPES — the core feature
   ============================================================ */
async function renderRecipes(main) {
  main.innerHTML = `
    <div class="page">
      <div class="page-header">
        <div>
          <div class="page-title">Recipes / Bill of Materials</div>
          <div class="page-subtitle">Link each product to its raw materials. Selling triggers automatic inventory deduction and COGS calculation.</div>
        </div>
      </div>
      <div class="card">
        <table class="tbl">
          <thead><tr><th>Product</th><th>Components</th><th class="text-end">Recipe Cost</th><th class="text-end">Sell Price</th><th class="text-end">Food Cost %</th><th></th></tr></thead>
          <tbody id="rec-rows"></tbody>
        </table>
      </div>
    </div>
  `;
  refreshRecipeRows();
}
function refreshRecipeRows() {
  const tbody = document.getElementById('rec-rows');
  if (!tbody) return;
  tbody.innerHTML = State.products.map(p => {
    const cost = recipeCost(p);
    const fcPct = p.price > 0 ? (cost/p.price*100) : 0;
    const ingCount = (p.recipe || []).length;
    return `
      <tr>
        <td><strong>${p.name}</strong> <span class="muted mono" style="font-size:11px">${p.sku}</span></td>
        <td>${ingCount===0?'<span class="muted">No recipe</span>':`${ingCount} ingredient${ingCount>1?'s':''}`}</td>
        <td class="num-cell">${fmt(cost)}</td>
        <td class="num-cell">${fmt(p.price)}</td>
        <td class="num-cell"><span class="tag ${fcPct<35?'green':fcPct<55?'amber':'red'}">${fcPct.toFixed(1)}%</span></td>
        <td class="text-end"><button class="btn btn-sm" data-id="${p.id}">Edit Recipe</button></td>
      </tr>
    `;
  }).join('');
  tbody.querySelectorAll('button').forEach(b => {
    b.onclick = () => recipeEditor(State.products.find(x => x.id === b.dataset.id));
  });
}

async function recipeEditor(product) {
  if (!product) return;
  let recipe = JSON.parse(JSON.stringify(product.recipe || []));

  // Recompute the cost line + food-cost % without rebuilding any inputs (so qty
  // typing doesn't drop focus on every keystroke).
  const recomputeCost = () => {
    const cost = recipe.reduce((s, ing) => {
      const m = State.materials.find(x => x.id === ing.materialId);
      if (!m) return s;
      const qm = convertQty(ing.qty, ing.unit, m.unit);
      return s + (qm || 0) * (m.costPerUnit || 0);
    }, 0);
    const costEl = document.getElementById('rec-cost');
    const fcEl   = document.getElementById('rec-fc');
    if (costEl) costEl.textContent = fmt(cost);
    if (fcEl)   fcEl.textContent = (product.price > 0 ? (cost / product.price * 100) : 0).toFixed(1) + '%';
  };

  const render = () => {
    const host = document.getElementById('rec-rows-edit');
    if (!host) return;
    host.innerHTML = recipe.map((ing, idx) => {
      const m = State.materials.find(x => x.id === ing.materialId);
      const baseUnit = m ? UNIT_CONV[m.unit]?.base : null;
      const compatibleUnits = Object.entries(UNIT_CONV).filter(([, v]) => v.base === baseUnit).map(([k]) => k);
      return `
        <div class="recipe-row">
          <select class="input" data-idx="${idx}" data-fld="materialId">
            ${State.materials.map(mat => `<option value="${mat.id}" ${mat.id===ing.materialId?'selected':''}>${mat.name} (${mat.unit})</option>`).join('')}
          </select>
          <input class="input" type="number" step="0.001" min="0" data-idx="${idx}" data-fld="qty" value="${ing.qty}" />
          <select class="input" data-idx="${idx}" data-fld="unit">
            ${(compatibleUnits.length?compatibleUnits:['g','ml','pc']).map(u => `<option value="${u}" ${u===ing.unit?'selected':''}>${u}</option>`).join('')}
          </select>
          <button class="btn btn-sm btn-danger" data-act="rm" data-idx="${idx}">×</button>
        </div>
      `;
    }).join('') || '<div class="muted" style="padding:12px;text-align:center;">No ingredients yet — add one below.</div>';
    recomputeCost();

    // Qty input: live-update recipe[idx].qty without re-rendering — preserves focus.
    host.querySelectorAll('input[data-fld="qty"]').forEach(el => {
      el.oninput = () => {
        const idx = +el.dataset.idx;
        recipe[idx].qty = +el.value || 0;
        recomputeCost();
      };
    });
    // Material change: re-render the row (so the unit dropdown filters to compatible units).
    host.querySelectorAll('select[data-fld="materialId"]').forEach(el => {
      el.onchange = () => {
        const idx = +el.dataset.idx;
        recipe[idx].materialId = el.value;
        const m = State.materials.find(x => x.id === el.value);
        const newBase = m ? UNIT_CONV[m.unit]?.base : null;
        const oldBase = UNIT_CONV[recipe[idx].unit]?.base;
        if (newBase && newBase !== oldBase) recipe[idx].unit = m.unit;
        render();
      };
    });
    // Unit change: just update + recompute, no re-render.
    host.querySelectorAll('select[data-fld="unit"]').forEach(el => {
      el.onchange = () => {
        const idx = +el.dataset.idx;
        recipe[idx].unit = el.value;
        recomputeCost();
      };
    });
    host.querySelectorAll('button[data-act="rm"]').forEach(b => {
      b.onclick = () => { recipe.splice(+b.dataset.idx, 1); render(); };
    });
  };

  modal(`
    <div class="modal-header"><h3>Recipe — ${product.name}</h3><button class="close-x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="row" style="justify-content:space-between;margin-bottom:12px;">
        <div><span class="muted">Sell price:</span> <strong>${fmt(product.price)}</strong></div>
        <div><span class="muted">Recipe cost:</span> <strong id="rec-cost">${fmt(0)}</strong> · <span class="muted">Food cost %:</span> <strong id="rec-fc">0%</strong></div>
      </div>
      <div style="display:grid;grid-template-columns:2fr 1fr 80px 32px;gap:8px;font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.05em;font-weight:500;padding:0 4px;">
        <div>Material</div><div>Quantity</div><div>Unit</div><div></div>
      </div>
      <div id="rec-rows-edit" style="margin-top:6px;"></div>
      <div class="row" style="gap:8px;margin-top:10px;">
        <button class="btn btn-sm" id="add-ing">+ Add Ingredient</button>
        <button class="btn btn-sm" id="add-new-mat">+ New Material (g / ml / pc)</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="rec-save">Save Recipe</button>
    </div>
  `, {large:true});

  document.getElementById('add-ing').onclick = () => {
    const m = State.materials[0];
    if (!m) { toast('No materials yet — use "+ New Material" to create one.','error'); return; }
    recipe.push({ materialId: m.id, qty: 1, unit: m.unit });
    render();
  };
  document.getElementById('add-new-mat').onclick = async () => {
    const created = await openQuickMaterialModal();
    if (!created) return;
    // Refresh State.materials so the new option appears in the dropdowns.
    await reloadState();
    recipe.push({ materialId: created.id, qty: 1, unit: created.unit });
    render();
  };
  document.getElementById('rec-save').onclick = async () => {
    product.recipe = recipe;
    await db.put('products', product);
    await reloadState();
    closeModal();
    refreshRecipeRows();
    if (typeof refreshProductRows === 'function' && document.getElementById('prod-rows')) refreshProductRows();
    toast('Recipe saved', 'success');
  };
  render();
}

// Quick-create a new material from inside the recipe editor.
// Resolves to the new material record, or null if cancelled.
async function openQuickMaterialModal() {
  return new Promise((resolve) => {
    const host = document.getElementById('modal-host');
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.style.zIndex = 150; // above the recipe editor (z-index 100)
    overlay.innerHTML = `
      <div class="modal" style="max-width:460px">
        <div class="modal-header"><h3>New Material</h3><button class="close-x" id="qm-x">×</button></div>
        <div class="modal-body">
          <div class="form-grid">
            <div class="field full"><label>Name</label><input class="input" id="qm-name" autofocus placeholder="e.g. Whole Milk" /></div>
            <div class="field"><label>SKU</label><input class="input" id="qm-sku" placeholder="auto" /></div>
            <div class="field"><label>Unit</label>
              <select class="input" id="qm-unit">
                <option value="g">g (grams)</option>
                <option value="ml">ml (milliliters)</option>
                <option value="pc">pc (piece)</option>
              </select>
            </div>
            <div class="field"><label>Cost / unit (${State.settings.currency})</label><input class="input" type="number" id="qm-cost" inputmode="decimal" step="0.001" min="0" value="0" /></div>
            <div class="field"><label>Opening stock</label><input class="input" type="number" id="qm-stock" inputmode="decimal" step="0.001" min="0" value="0" /></div>
            <div class="field"><label>Reorder point</label><input class="input" type="number" id="qm-reorder" inputmode="decimal" step="0.001" min="0" value="0" /></div>
            <div class="field full"><label>Supplier (optional)</label><input class="input" id="qm-sup" /></div>
          </div>
          <p class="muted" style="font-size:12px;margin-top:10px;">If opening stock &gt; 0, an opening journal entry will post: Dr 1100 Inventory / Cr 3010 Owner's Capital.</p>
        </div>
        <div class="modal-footer">
          <button class="btn" id="qm-cancel">Cancel</button>
          <button class="btn btn-primary" id="qm-save">Create &amp; add to recipe</button>
        </div>
      </div>`;
    host.appendChild(overlay);
    setTimeout(() => document.getElementById('qm-name')?.focus(), 0);

    const close = (val) => { overlay.remove(); resolve(val); };
    overlay.querySelector('#qm-x').onclick     = () => close(null);
    overlay.querySelector('#qm-cancel').onclick = () => close(null);
    overlay.querySelector('#qm-save').onclick = async () => {
      const name = document.getElementById('qm-name').value.trim();
      const unit = document.getElementById('qm-unit').value;
      const cost = +document.getElementById('qm-cost').value || 0;
      const stock = +document.getElementById('qm-stock').value || 0;
      const reorder = +document.getElementById('qm-reorder').value || 0;
      const sup = document.getElementById('qm-sup').value.trim();
      if (!name) { toast('Name required','error'); return; }
      // Auto SKU: M-### using max+1 of existing M-prefixed SKUs.
      let sku = document.getElementById('qm-sku').value.trim();
      if (!sku) {
        const nums = State.materials.map(m => parseInt((m.sku||'').replace(/^M-/,''),10) || 0);
        const next = (nums.length ? Math.max(...nums) : 0) + 1;
        sku = 'M-' + String(next).padStart(3,'0');
      }
      const mat = {
        id: uid(), sku, name, unit,
        costPerUnit: cost, stock, reorderPoint: reorder,
        supplier: sup,
      };
      await db.put('materials', mat);
      // Opening-inventory journal entry for the seeded stock.
      if (stock > 0 && cost > 0) {
        try {
          await postJournal({
            refType: 'opening_mat', refId: mat.id, memo: `Opening stock: ${name}`,
            lines: [
              { account: '1100', dr: stock * cost, cr: 0, memo: `Opening ${name}` },
              { account: '3010', dr: 0, cr: stock * cost, memo: "Owner's capital — inventory" },
            ],
          });
        } catch (e) { console.warn('Opening journal skipped:', e.message); }
      }
      toast('Material created','success');
      close(mat);
    };
  });
}

   INVENTORY (Materials)

async function renderInventory(main) {
  main.innerHTML = `
    <div class="page">
      <div class="page-header">
        <div>
          <div class="page-title">Inventory — Raw Materials</div>
          <div class="page-subtitle">Stock is automatically reduced when products are sold (per their recipe).</div>
        </div>
        <div class="page-actions">
          <button class="btn" id="adj-btn">Stock Adjustment</button>
          <button class="btn btn-primary" id="add-mat">+ New Material</button>
        </div>
      </div>
      <div class="stat-row" id="inv-stats"></div>
      <div class="card">
        <table class="tbl">
          <thead><tr><th>SKU</th><th>Name</th><th>Supplier</th><th class="text-end">Stock</th><th>Unit</th><th class="text-end">Cost / Unit</th><th class="text-end">Stock Value</th><th>Status</th><th></th></tr></thead>
          <tbody id="mat-rows"></tbody>
        </table>
      </div>
    </div>
  `;
  document.getElementById('add-mat').onclick = () => materialEditor(null);
  document.getElementById('adj-btn').onclick = openAdjustModal;

}

function refreshMatRows() {
  const tbody = document.getElementById('mat-rows');
  if (!tbody) return;
  const mats = State.materials.sort((a,b)=>a.sku.localeCompare(b.sku));
  let totalValue = 0, lowCount = 0, outCount = 0;
  tbody.innerHTML = mats.map(m => {
    const value = (m.stock||0) * (m.costPerUnit||0);
    totalValue += value;
    let status, statusClass;
    if ((m.stock||0) <= 0) { status = 'Out of stock'; statusClass = 'red'; outCount++; }
    else if ((m.stock||0) <= (m.reorderPoint||0)) { status = 'Reorder'; statusClass = 'amber'; lowCount++; }
    else { status = 'OK'; statusClass = 'green'; }
    return `
      <tr>
        <td class="mono">${m.sku}</td>
        <td><strong>${m.name}</strong></td>
        <td>${m.supplier||''}</td>
        <td class="num-cell">${fmtNum(m.stock||0, m.unit==='pc'?0:1)}</td>
        <td>${m.unit}</td>
        <td class="num-cell">${fmt(m.costPerUnit||0)}</td>
        <td class="num-cell">${fmt(value)}</td>
        <td><span class="tag ${statusClass}">${status}</span></td>
        <td class="text-end"><button class="btn btn-sm" data-id="${m.id}">Edit</button></td>
      </tr>
    `;
  }).join('') || `<tr><td colspan="9" class="empty-row">No materials yet</td></tr>`;
  document.getElementById('inv-stats').innerHTML = `
    <div class="stat"><div class="lbl">Total SKUs</div><div class="num">${mats.length}</div></div>
    <div class="stat"><div class="lbl">Stock Value</div><div class="num">${fmt(totalValue)}</div></div>
    <div class="stat ${lowCount>0?'alert':''}"><div class="lbl">Reorder Alerts</div><div class="num">${lowCount}</div></div>
    <div class="stat ${outCount>0?'alert':''}"><div class="lbl">Out of Stock</div><div class="num">${outCount}</div></div>
  `;
  tbody.querySelectorAll('button').forEach(b => {
    b.onclick = () => materialEditor(State.materials.find(x => x.id === b.dataset.id));
  });
}

async function materialEditor(material) {
  const isNew = !material;
  const m = material || { id: uid(), sku:'', name:'', unit:'g', costPerUnit:0, stock:0, reorderPoint:0, supplier:'' };
  modal(`
    <div class="modal-header"><h3>${isNew?'New':'Edit'} Material</h3><button class="close-x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field"><label>SKU</label><input class="input" id="m-sku" value="${m.sku}" /></div>
        <div class="field"><label>Name</label><input class="input" id="m-name" value="${m.name}" /></div>
        <div class="field">
          <label>Unit</label>
          <select class="input" id="m-unit">
            ${['g','kg','ml','l','pc'].map(u => `<option value="${u}" ${u===m.unit?'selected':''}>${u}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Cost per Unit</label><input class="input" type="number" step="0.001" id="m-cost" value="${m.costPerUnit}" /></div>
        ${isNew?`<div class="field"><label>Opening Stock</label><input class="input" type="number" step="0.01" id="m-stock" value="${m.stock||0}" /></div>`:''}
        <div class="field"><label>Reorder Point</label><input class="input" type="number" step="0.01" id="m-reorder" value="${m.reorderPoint||0}" /></div>
        <div class="field full"><label>Supplier</label><input class="input" id="m-sup" value="${m.supplier||''}" /></div>
      </div>
    </div>
    <div class="modal-footer">
      ${!isNew?`<button class="btn btn-danger" id="m-del">Delete</button>`:''}
      <div style="flex:1"></div>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="m-save">Save</button>
    </div>
  `);
  document.getElementById('m-save').onclick = async () => {
    const updated = {
      ...m,
      sku: document.getElementById('m-sku').value.trim(),
      name: document.getElementById('m-name').value.trim(),
      unit: document.getElementById('m-unit').value,
      costPerUnit: +document.getElementById('m-cost').value || 0,
      reorderPoint: +document.getElementById('m-reorder').value || 0,
      supplier: document.getElementById('m-sup').value.trim(),
    };
    if (isNew) {
      const opening = +document.getElementById('m-stock').value || 0;
      updated.stock = opening;
      await db.put('materials', updated);
      // post opening as capital injection in inventory
      if (opening > 0) {
        const value = opening * updated.costPerUnit;
        await postJournal({
          refType:'opening_mat', refId: updated.id, memo:`Opening stock: ${updated.name}`,
          lines:[ {account:'1100', dr:value, cr:0, memo:'Inventory in'}, {account:'3010', dr:0, cr:value, memo:'Owner contribution'} ]
        });
        await db.put('stockMoves', { id: uid(), date: nowISO(), materialId: updated.id, qty: opening, type:'in', refType:'opening', refId: updated.id, costPerUnit: updated.costPerUnit, signedDelta: opening });
      }
    } else {
      await db.put('materials', updated);
    }
    await reloadState();
    closeModal();
    refreshMatRows();
    toast('Saved','success');
  };
  if (!isNew) {
    document.getElementById('m-del').onclick = async () => {
      if (!confirm('Delete material?')) return;
      await db.del('materials', m.id);
      await reloadState();
      closeModal(); refreshMatRows();
    };
  }
}

async function openAdjustModal() {
  modal(`
    <div class="modal-header"><h3>Stock Adjustment</h3><button class="close-x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field full">
          <label>Material</label>
          <select class="input" id="adj-mat">
            ${State.materials.map(m => `<option value="${m.id}">${m.name} — current: ${fmtNum(m.stock||0,1)} ${m.unit}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Type</label>
          <select class="input" id="adj-type">
            <option value="in">Stock In (e.g. count correction up)</option>
            <option value="out">Stock Out (e.g. count correction down)</option>
            <option value="waste">Waste / Spoilage</option>
          </select>
        </div>
        <div class="field"><label>Quantity</label><input class="input" type="number" step="0.01" id="adj-qty" value="0" /></div>
        <div class="field full"><label>Notes</label><input class="input" id="adj-notes" placeholder="Reason for adjustment" /></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="adj-save">Apply</button>
    </div>
  `);
  document.getElementById('adj-save').onclick = async () => {
    const matId = document.getElementById('adj-mat').value;
    const type = document.getElementById('adj-type').value;
    const qty = +document.getElementById('adj-qty').value || 0;
    const notes = document.getElementById('adj-notes').value;
    if (qty <= 0) { toast('Quantity must be > 0','error'); return; }
    const m = State.materials.find(x => x.id === matId);
    if (!m) return;
    const value = qty * (m.costPerUnit||0);
    await recordStockMove(matId, qty, type, 'adjustment', uid(), m.costPerUnit);
    // journal: waste -> Waste Exp Dr / Inventory Cr;  out (correction) -> Other Exp Dr / Inv Cr; in -> Inv Dr / Other Exp or Owner
    if (type === 'waste' || type === 'out') {
      const expAcct = type === 'waste' ? '5100' : '6080';
      await postJournal({
        refType:'adjustment', refId: matId, memo: `${type==='waste'?'Waste':'Adjust out'}: ${m.name} — ${notes}`,
        lines: [ {account: expAcct, dr: value, cr: 0, memo: notes}, {account:'1100', dr:0, cr:value, memo:'Inventory'} ]
      });
    } else {
      await postJournal({
        refType:'adjustment', refId: matId, memo: `Adjust in: ${m.name} — ${notes}`,
        lines: [ {account:'1100', dr:value, cr:0, memo:'Inventory'}, {account:'3010', dr:0, cr:value, memo:notes||'Adj in'} ]
      });
    }
    await reloadState();
    closeModal();
    refreshMatRows();
    toast('Adjustment recorded','success');
  };
}
</script>
<script>
/* ============================================================
   PURCHASES (Goods Receipt)
   ============================================================ */
async function renderPurchases(main) {
  const purchases = await db.getAll('purchases');
  main.innerHTML = `
    <div class="page">
      <div class="page-header">
        <div>
          <div class="page-title">Purchases</div>
          <div class="page-subtitle">Record raw material purchases. Inventory and accounting update automatically (FIFO/weighted-avg costing).</div>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" id="add-po">+ New Purchase</button>
        </div>
      </div>
      <div class="card">
        <table class="tbl">
          <thead><tr><th>Date</th><th>Supplier</th><th>Items</th><th class="text-end">Total</th><th>Status</th><th></th></tr></thead>
          <tbody>
            ${purchases.length===0?'<tr><td colspan="6" class="empty-row">No purchases recorded</td></tr>':
              purchases.sort((a,b)=>b.date.localeCompare(a.date)).map(po => `
                <tr>
                  <td>${po.date.slice(0,10)}</td>

                  <td class="text-end">${po.status!=='paid'?`<button class="btn btn-sm" data-id="${po.id}" data-act="pay">Mark Paid</button>`:''}</td>
                </tr>
              `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
  document.getElementById('add-po').onclick = openPurchaseModal;
  document.querySelectorAll('[data-act="pay"]').forEach(b => {
    b.onclick = async () => {
      const po = (await db.getAll('purchases')).find(x => x.id === b.dataset.id);
      if (!po) return;
      // post payment journal: AP Dr / Cash Cr
      await postJournal({
        refType:'purchase_pay', refId: po.id, memo:`Pay supplier`,
        lines:[ {account:'2010', dr: po.total, cr:0, memo:'AP'}, {account:'1010', dr:0, cr: po.total, memo:'Cash'} ]
      });
      po.status = 'paid';
      await db.put('purchases', po);
      toast('Marked paid','success');
      renderPurchases(main);
    };

}

async function openPurchaseModal() {
  let items = [];
  const updateTotal = () => {
    const total = items.reduce((s,i)=>s + (+i.qty||0) * (+i.unitCost||0), 0);
    const el = document.getElementById('po-total');
    if (el) el.textContent = fmt(total);
  };
  const renderItems = () => {
    document.getElementById('po-items').innerHTML = items.length===0
      ? '<div class="muted" style="padding:12px;text-align:center;">No items added</div>'
      : items.map((it, idx) => `
          <div class="recipe-row" style="grid-template-columns:2fr 1fr 1fr 32px;">
            <select class="input" data-idx="${idx}" data-fld="materialId">
              ${State.materials.map(mat => `<option value="${mat.id}" ${mat.id===it.materialId?'selected':''}>${mat.name} (${mat.unit})</option>`).join('')}
            </select>
            <input class="input" type="number" step="0.01" min="0" data-idx="${idx}" data-fld="qty" value="${it.qty}" placeholder="Qty" />
            <input class="input" type="number" step="0.001" min="0" data-idx="${idx}" data-fld="unitCost" value="${it.unitCost}" placeholder="Unit cost" />
            <button class="btn btn-sm btn-danger" data-act="rm" data-idx="${idx}">×</button>
          </div>
        `).join('');
    updateTotal();
    // Live-update on input: write through to state and refresh the total only.
    // Do NOT re-render the row, or the input gets destroyed mid-keystroke and focus is lost
    // (this is what made typing "1000" impossible — only the first digit survived).
    document.querySelectorAll('#po-items input[data-fld]').forEach(el => {
      el.oninput = () => {
        const idx = +el.dataset.idx, fld = el.dataset.fld;
        items[idx][fld] = +el.value || 0;
        updateTotal();
      };
    });
    document.querySelectorAll('#po-items select[data-fld]').forEach(el => {
      el.onchange = () => {
        const idx = +el.dataset.idx, fld = el.dataset.fld;
        items[idx][fld] = el.value;
      };
    });
    document.querySelectorAll('#po-items [data-act="rm"]').forEach(b => {
      b.onclick = () => { items.splice(+b.dataset.idx, 1); renderItems(); };
    });
  };

  modal(`
    <div class="modal-header"><h3>New Purchase</h3><button class="close-x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field"><label>Date</label><input class="input" type="date" id="po-date" value="${todayISO()}" /></div>
        <div class="field"><label>Supplier</label><input class="input" id="po-supplier" placeholder="Supplier name" /></div>
      </div>
      <div style="margin-top:14px;">
        <div style="display:grid;grid-template-columns:2fr 1fr 1fr 32px;gap:8px;font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.05em;font-weight:500;padding:0 4px;">
          <div>Material</div><div>Quantity</div><div>Unit Cost</div><div></div>
        </div>
        <div id="po-items"></div>
        <button class="btn btn-sm" id="add-po-item" style="margin-top:10px;">+ Add Item</button>
      </div>
      <div class="row" style="justify-content:space-between;margin-top:18px;padding:12px;background:var(--bg-2);border-radius:8px;">
        <strong>Total</strong>
        <strong class="mono" id="po-total">${fmt(0)}</strong>
      </div>
      <div class="row" style="margin-top:12px;align-items:center;">
        <input type="checkbox" id="po-paid" /> <label for="po-paid">Paid in cash now (otherwise tracked as Account Payable)</label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="po-save">Save Purchase</button>
    </div>
  `, {large:true});
  document.getElementById('add-po-item').onclick = () => {
    const m = State.materials[0];
    if (!m) return;
    items.push({ materialId: m.id, qty: 1, unitCost: m.costPerUnit||0 });
    renderItems();
  };
  document.getElementById('po-save').onclick = async () => {
    if (items.length === 0) { toast('Add at least one item','error'); return; }
    await finalizePurchase({
      date: document.getElementById('po-date').value || todayISO(),
      supplierId: document.getElementById('po-supplier').value || '',
      items, paid: document.getElementById('po-paid').checked
    });
    await reloadState();
    closeModal();
    toast('Purchase recorded','success');
    renderPurchases(document.getElementById('main'));
  };
  renderItems();
}

      <div class="modal-body">
        <div class="form-grid">
          <div class="field"><label>Date</label><input class="input" type="date" id="e-date" value="${todayISO()}" /></div>

/* ============================================================
   ORDERS HISTORY
   ============================================================ */
async function renderOrders(main) {
  const orders = (await db.getAll('orders')).sort((a,b) => (b.num||0) - (a.num||0));
  main.innerHTML = `
    <div class="page">
      <div class="page-header">
        <div>
          <div class="page-title">Orders</div>
          <div class="page-subtitle">All sales transactions. Tap a row to view receipt.</div>
        </div>
        <div class="page-actions">
          <input class="input" type="date" id="o-from" value="${todayISO()}" style="width:auto" />
          <span class="muted">to</span>
          <input class="input" type="date" id="o-to" value="${todayISO()}" style="width:auto" />
          <button class="btn" id="o-filter">Filter</button>
        </div>
      </div>
      <div class="stat-row" id="o-stats"></div>
      <div class="card">
        <table class="tbl">
          <thead><tr><th>#</th><th>Date / Time</th><th>Mode</th><th>Items</th><th>Method</th><th class="text-end">Subtotal</th><th class="text-end">Disc</th><th class="text-end">VAT</th><th class="text-end">Total</th><th class="text-end">COGS</th><th class="text-end">Margin</th><th></th></tr></thead>
          <tbody id="o-rows"></tbody>
        </table>
      </div>
    </div>
  `;
  const filter = () => {
    const from = document.getElementById('o-from').value;
    const to = document.getElementById('o-to').value;
    const filtered = orders.filter(o => {
      const d = o.date.slice(0,10);
      return d >= from && d <= to;
    });
    const tbody = document.getElementById('o-rows');
    if (filtered.length === 0) { tbody.innerHTML = `<tr><td colspan="12" class="empty-row">No orders in range</td></tr>`; }
    else {
      tbody.innerHTML = filtered.map(o => {
        const disc = o.discount || 0;
        const margin = (o.subtotal - disc) - (o.cogs||0);
        const base = o.subtotal - disc;
        const mPct = base > 0 ? (margin/base*100) : 0;
        const isVoided = o.status === 'voided';
        return `
          <tr class="${isVoided?'voided':''}">
            <td class="mono"><strong>#${o.num}</strong>${isVoided?` <span class="tag voided">${t('voided')}</span>`:''}</td>
            <td>${new Date(o.date).toLocaleString()}</td>
            <td><span class="tag">${o.mode}</span></td>
            <td>${o.items.length}</td>
            <td><span class="tag blue">${o.payment?.method||'cash'}</span></td>
            <td class="num-cell">${fmt(o.subtotal)}</td>
            <td class="num-cell">${disc>0 ? `<span class="tag amber">−${fmtNum(disc)}</span>` : '—'}</td>
            <td class="num-cell">${fmt(o.vat)}</td>
            <td class="num-cell"><strong>${fmt(o.total)}</strong></td>
            <td class="num-cell">${fmt(o.cogs||0)}</td>
            <td class="num-cell"><span class="tag ${mPct>50?'green':mPct>20?'amber':'red'}">${mPct.toFixed(1)}%</span></td>
            <td class="text-end">
              <button class="btn btn-sm" data-act="view" data-id="${o.id}">View</button>
              ${!isVoided ? `<button class="btn btn-sm btn-danger" data-act="void" data-id="${o.id}">${t('voidOrder')}</button>` : ''}
            </td>
          </tr>
        `;
      }).join('');
      tbody.querySelectorAll('button[data-act]').forEach(b => {
        b.onclick = async () => {
          const o = orders.find(x => x.id === b.dataset.id);
          if (!o) return;
          if (b.dataset.act === 'view') return openReceiptModal(o);
          if (b.dataset.act === 'void') {
            const ok = await openVoidModal(o.id);
            if (ok) renderOrders(document.getElementById('main'));
          }
        };
      });
    }
    const paidOnly = filtered.filter(o => o.status !== 'voided');
    const totals = paidOnly.reduce((s,o) => ({
      sales: s.sales + o.total,
      count: s.count + 1,
      vat:   s.vat   + o.vat,
      cogs:  s.cogs  + (o.cogs||0),
      discount: s.discount + (o.discount||0),
      discountedCount: s.discountedCount + ((o.discount||0) > 0 ? 1 : 0),
    }), {sales:0,count:0,vat:0,cogs:0,discount:0,discountedCount:0});
    document.getElementById('o-stats').innerHTML = `
      <div class="stat"><div class="lbl">Orders</div><div class="num">${totals.count}</div></div>
      <div class="stat"><div class="lbl">Sales (incl. VAT)</div><div class="num">${fmt(totals.sales)}</div></div>
      <div class="stat"><div class="lbl">Discounts</div><div class="num">${fmt(totals.discount)}</div><div class="lbl" style="margin-top:4px;">${totals.discountedCount}/${totals.count} orders</div></div>
      <div class="stat"><div class="lbl">VAT Collected</div><div class="num">${fmt(totals.vat)}</div></div>
      <div class="stat"><div class="lbl">COGS</div><div class="num">${fmt(totals.cogs)}</div></div>
      <div class="stat"><div class="lbl">Avg Ticket</div><div class="num">${fmt(totals.count?totals.sales/totals.count:0)}</div></div>
    `;
  };
  document.getElementById('o-filter').onclick = filter;
  filter();
}

/* ============================================================
   SHIFTS — list, reprint Z-report, reopen
   ============================================================ */
async function renderShifts(main) {
  const shifts = (await db.getAll('shifts')).sort((a,b) => (b.num||0) - (a.num||0));
  const users = await db.getAll('users');
  const userMap = Object.fromEntries(users.map(u => [u.id, u.name]));
  const isMgr = State.cashier && (State.cashier.role === 'manager' || State.cashier.role === 'owner');

  main.innerHTML = `
    <div class="page">
      <div class="page-header">
        <div>
          <div class="page-title">${t('shifts')}</div>
          <div class="page-subtitle">All cashier shifts. Reprint a Z-report or, with manager auth, reopen a recently closed shift.</div>
        </div>
      </div>
      <div class="card">
        <table class="tbl">
          <thead><tr>
            <th>#</th><th>Cashier</th><th>${t('opened')}</th><th>${t('closed')}</th>
            <th class="text-end">${t('openingFloat')}</th>
            <th class="text-end">${t('expectedInDrawer')}</th>
            <th class="text-end">${t('countedCash')}</th>
            <th class="text-end">${t('variance')}</th>
            <th>Status</th>
            <th></th>
          </tr></thead>
          <tbody id="sh-rows"></tbody>
        </table>
      </div>
    </div>`;

  const tbody = document.getElementById('sh-rows');
  if (shifts.length === 0) {
    tbody.innerHTML = `<tr><td colspan="10" class="empty-row">No shifts yet</td></tr>`;
  } else {
    tbody.innerHTML = shifts.map(s => {
      const v = s.variance;
      const vCls = v == null ? '' : Math.abs(v) < 0.01 ? 'green' : v < 0 ? 'red' : 'amber';
      const vTxt = v == null ? '—' : `${v>0?'+':''}${fmt(v)}`;
      const statusCls = s.status === 'open' ? 'green' : s.status === 'reopened' ? 'amber' : 'blue';
      const closeFlow = s.status === 'open' || s.status === 'reopened';
      const canReopen = s.status === 'closed' && isMgr && s.closedAt && (Date.now() - new Date(s.closedAt).getTime() <= 24*3600*1000);
      const hasZReport = !!s.zReportJson;
      return `
        <tr>
          <td class="mono"><strong>#${s.num}</strong></td>
          <td>${userMap[s.cashierId] || '—'}</td>
          <td>${s.openedAt ? new Date(s.openedAt).toLocaleString() : '—'}</td>
          <td>${s.closedAt ? new Date(s.closedAt).toLocaleString() : '—'}</td>
          <td class="num-cell">${fmt(s.openingFloat||0)}</td>
          <td class="num-cell">${s.expectedCash != null ? fmt(s.expectedCash) : '—'}</td>
          <td class="num-cell">${s.countedCash != null ? fmt(s.countedCash) : '—'}</td>
          <td class="num-cell">${v == null ? '—' : `<span class="tag ${vCls}">${vTxt}</span>`}</td>
          <td><span class="tag ${statusCls}">${s.status}</span></td>
          <td class="text-end" style="white-space:nowrap;">
            ${hasZReport ? `<button class="btn btn-sm" data-act="reprint" data-id="${s.id}">${t('reprint')}</button>` : ''}
            ${closeFlow && isMgr ? `<button class="btn btn-sm btn-primary" data-act="forceclose" data-id="${s.id}">${t('closeShift')}</button>` : ''}
            ${canReopen ? `<button class="btn btn-sm" data-act="reopen" data-id="${s.id}">${t('reopen')}</button>` : ''}
          </td>
        </tr>`;
    }).join('');
    tbody.querySelectorAll('button[data-act]').forEach(b => {
      b.onclick = async () => {
        const id = b.dataset.id;
        if (b.dataset.act === 'reprint') {
          State.zReportShiftId = id;
          await navigate('zreport');
          setTimeout(() => window.print(), 250);
        } else if (b.dataset.act === 'reopen') {
          const ok = await openReopenModal(id);
          if (ok) renderShifts(main);
        } else if (b.dataset.act === 'forceclose') {
          const ok = await startCloseShiftFlow(id, State.cashier?.id);
          if (ok) renderShifts(main);
        }
      };
    });
  }
}

/* ============================================================
   Z-REPORT (print view)
   ============================================================ */
async function renderZReport(main) {
  const id = State.zReportShiftId;
  if (!id) {
    main.innerHTML = `<div class="page"><p class="muted" style="padding:40px;">No Z-report selected. Open Reports → Shifts and click Reprint.</p></div>`;
    return;
  }
  const shift = await db.get('shifts', id);
  if (!shift) {
    main.innerHTML = `<div class="page"><p class="muted" style="padding:40px;">Shift not found.</p></div>`;
    return;
  }
  // Read the snapshot if available; otherwise compute live (e.g. shift still open).
  let data;
  if (shift.zReportJson) {
    try { data = JSON.parse(shift.zReportJson); } catch { data = null; }
  }
  if (!data) data = await getShiftSummary(id);

  const s = State.settings;
  const fmtTime = (iso) => iso ? new Date(iso).toLocaleString() : '—';
  const users = await db.getAll('users');
  const userMap = Object.fromEntries(users.map(u => [u.id, u.name]));

  const payRow = (label, p) => `
    <div class="pay-row">
      <div>${label}</div>
      <div class="num-cell">${p.count}</div>
      <div class="num-cell">${fmt(p.gross)}</div>
      <div class="num-cell">${fmt(p.refunds)}</div>
      <div class="num-cell">${fmt(p.net)}</div>
    </div>`;

  const totalNet = data.byPayment.cash.net + data.byPayment.card.net + data.byPayment.wallet.net;

  const variance = data.cash.variance;
  const varianceLabel = variance == null ? '' : Math.abs(variance) < 0.01 ? 'BALANCED' : variance < 0 ? 'SHORT' : 'OVER';

  main.innerHTML = `
    <div class="page">
      <div class="page-header" style="print:hidden">
        <div>
          <div class="page-title">${t('zReport')} — Shift #${data.shift.num}</div>
          <div class="page-subtitle">Snapshot taken at close. Reflects values at close-time, not current.</div>
        </div>
        <div class="page-actions">
          <button class="btn" onclick="window.print()">🖨 Print</button>
          <button class="btn" onclick="navigate('shifts')">← Back</button>
        </div>
      </div>

      <div class="z-report" id="z-report-doc">
        <div class="center">
          <div class="name">${s.shopName || ''}</div>
          <div class="small">${s.address || ''}</div>
          <div class="small">${s.phone || ''}</div>
          ${s.taxId?`<div class="small">Tax ID: ${s.taxId}</div>`:''}
        </div>
        <div class="heavy"></div>
        <div class="center big">${t('zReport').toUpperCase()}</div>
        <div class="sep"></div>
        <div class="row"><span>${t('shift')} #${data.shift.num}</span><span></span></div>
        <div class="row"><span>${t('cashier')}</span><span>${data.shift.cashier.name}</span></div>
        <div class="row"><span>${t('opened')}</span><span>${fmtTime(data.shift.openedAt)}</span></div>
        <div class="row"><span>${t('closed')}</span><span>${fmtTime(data.shift.closedAt)}</span></div>
        ${data.shift.closedBy?`<div class="row"><span>${t('closedBy')}</span><span>${userMap[data.shift.closedBy]||'—'}</span></div>`:''}

        <div class="sep"></div><h4>${t('totalOrders')}</h4>
        <div class="row"><span>${t('totalOrders')}</span><span>${data.totals.orderCount + data.totals.voidedCount}</span></div>
        <div class="row"><span>${t('voidedOrders')}</span><span>${data.totals.voidedCount}</span></div>
        <div class="row"><span>${t('netOrderCount')}</span><span>${data.totals.orderCount}</span></div>

        <div class="sep"></div><h4>${t('sales')}</h4>
        <div class="row"><span>${t('grossSales')}</span><span>${fmt(data.totals.grossSales)}</span></div>
        <div class="row"><span>${t('discountsGiven')}</span><span>−${fmt(data.totals.discounts)}</span></div>
        <div class="row"><span>${t('vatCollected')}</span><span>${fmt(data.totals.vat)}</span></div>
        <div class="row"><span>${t('netRevenue')}</span><span>${fmt(data.totals.netSales)}</span></div>
        <div class="row"><span>${t('cogs')}</span><span>${fmt(data.totals.cogs)}</span></div>
        <div class="row"><span>${t('grossProfit')}</span><span><strong>${fmt(data.totals.netSales - data.totals.cogs)}</strong></span></div>

        <div class="sep"></div><h4>${t('byPayment')}</h4>
        <div class="pay-row h"><div></div><div>Count</div><div>Gross</div><div>Refunds</div><div>Net</div></div>
        ${payRow('Cash',   data.byPayment.cash)}
        ${payRow('Card',   data.byPayment.card)}
        ${payRow('Wallet', data.byPayment.wallet)}
        <div class="row" style="margin-top:4px;border-top:1px solid #000;padding-top:2px;"><span><strong>Total</strong></span><span><strong>${fmt(totalNet)}</strong></span></div>

        ${data.byCategory.length ? `
          <div class="sep"></div><h4>${t('byCategory')}</h4>
          ${data.byCategory.map(c => `
            <div class="row"><span>${c.categoryName}</span><span>${c.qty}× &nbsp; ${fmt(c.revenue)}</span></div>
          `).join('')}` : ''}

        ${data.topSellers.length ? `
          <div class="sep"></div><h4>${t('topSellers')}</h4>
          ${data.topSellers.map((p,i) => `
            <div class="row"><span>${i+1}. ${p.name}</span><span>${p.qty}× &nbsp; ${fmt(p.revenue)}</span></div>
          `).join('')}` : ''}

        ${data.voids.length ? `
          <div class="sep"></div><h4>${t('voids')}</h4>
          ${data.voids.map(v => `
            <div class="row"><span>#${v.num}</span><span>−${fmt(v.total)}</span></div>
            <div class="small">Reason: ${v.reason || '—'}</div>
            <div class="small">By ${v.voidedByName}, auth ${v.managerName}</div>
          `).join('<div style="height:4px"></div>')}` : ''}

        <div class="sep"></div><h4>${t('cashRecon')}</h4>
        <div class="row"><span>${t('openingFloat')}</span><span>+ ${fmt(data.cash.openingFloat)}</span></div>
        <div class="row"><span>Cash sales (net)</span><span>+ ${fmt(data.byPayment.cash.net)}</span></div>
        <div class="row"><span><strong>${t('expectedInDrawer')}</strong></span><span><strong>${fmt(data.cash.expectedCash)}</strong></span></div>
        <div class="row"><span>${t('countedCash')}</span><span>${data.cash.countedCash != null ? fmt(data.cash.countedCash) : '—'}</span></div>
        <div class="row"><span><strong>${t('variance')}</strong></span><span><strong>${variance == null ? '—' : (variance>0?'+':'') + fmt(variance) + (varianceLabel?'   '+varianceLabel:'')}</strong></span></div>

        <div class="heavy"></div>
        <div class="center small">${t('end')}</div>
        <div class="center small">${t('printedAt')} ${new Date().toLocaleString()}</div>
        <div style="height:14px"></div>
        <div class="small">${t('signCashier')}: _________________________</div>
        <div style="height:8px"></div>
        <div class="small">${t('signManager')}: _________________________</div>
      </div>
    </div>`;
}

<script>
/* ============================================================
   DASHBOARD
   ============================================================ */
async function renderDashboard(main) {
  const orders = await db.getAll('orders');
  const today = todayISO();
  const ofToday = orders.filter(o => o.date.slice(0,10) === today);
  const week = (() => { const d = new Date(); d.setDate(d.getDate()-7); return d.toISOString().slice(0,10); })();
  const ofWeek = orders.filter(o => o.date.slice(0,10) >= week);
  const month = today.slice(0,7);
  const ofMonth = orders.filter(o => o.date.slice(0,7) === month);

  const sum = (arr, k) => arr.reduce((s,o)=>s+(o[k]||0), 0);
  const todaySales = sum(ofToday,'total'), todayCOGS = sum(ofToday,'cogs');
  const weekSales = sum(ofWeek,'total');
  const monthSales = sum(ofMonth,'total'), monthCOGS = sum(ofMonth,'cogs');

  // PNL (month to date)
  const monthStart = today.slice(0,7) + '-01';
  const pnl = await getPnL(monthStart, today);

  // Top sellers (this month)
  const productSales = {};
  for (const o of ofMonth) {
    for (const it of o.items) {
      productSales[it.productId] = productSales[it.productId] || { name: it.name, qty:0, revenue:0 };
      productSales[it.productId].qty += it.qty;
      productSales[it.productId].revenue += it.lineTotal;
    }
  }
  const topProducts = Object.values(productSales).sort((a,b)=>b.revenue-a.revenue).slice(0,8);

  // Hourly heatmap (today)
  const hours = Array(24).fill(0);
  for (const o of ofToday) hours[new Date(o.date).getHours()] += o.total;
  const maxHour = Math.max(...hours, 1);

  // Low stock
  const lowStock = State.materials.filter(m => (m.stock||0) <= (m.reorderPoint||0));

  // Cash on hand
  const cashBal = await getAccountBalance('1010');
  const bankBal = await getAccountBalance('1020');
  const invBal  = await getAccountBalance('1100');

  main.innerHTML = `
    <div class="page">
      <div class="page-header">
        <div>
          <div class="page-title">Dashboard</div>
          <div class="page-subtitle">${new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' })}</div>
        </div>
      </div>

      <div class="stat-row">
        <div class="stat"><div class="lbl">Today's Sales</div><div class="num">${fmt(todaySales)}</div><div class="delta">${ofToday.length} orders</div></div>
        <div class="stat"><div class="lbl">7-Day Sales</div><div class="num">${fmt(weekSales)}</div><div class="delta">${ofWeek.length} orders</div></div>
        <div class="stat"><div class="lbl">MTD Net Profit</div><div class="num">${fmt(pnl.netProfit)}</div><div class="delta ${pnl.netProfit>=0?'up':'down'}">${pnl.totalRevenue>0?(pnl.netProfit/pnl.totalRevenue*100).toFixed(1)+'%':'—'} margin</div></div>
        <div class="stat"><div class="lbl">Cash on Hand</div><div class="num">${fmt(cashBal)}</div><div class="delta">Bank: ${fmt(bankBal)}</div></div>
        <div class="stat"><div class="lbl">Inventory Value</div><div class="num">${fmt(invBal)}</div><div class="delta">${lowStock.length} low-stock</div></div>
      </div>

      <div class="grid grid-2">
        <div class="card">
          <h4 class="card-h">Today's Sales by Hour</h4>
          ${ofToday.length === 0 ? '<div class="muted" style="padding:40px;text-align:center;">No sales yet today</div>' : `
            <div class="bar-chart">
              ${hours.map((v,h) => v > 0 ? `<div class="bar" style="height:${v/maxHour*180}px" data-label="${h}:00 — ${fmt(v)}"></div>` : '<div style="flex:1"></div>').join('')}
            </div>
            <div class="bar-labels">${hours.map((v,h) => `<span>${h%6===0?h:''}</span>`).join('')}</div>
          `}
        </div>

        <div class="card">
          <h4 class="card-h">Top Sellers (This Month)</h4>
          ${topProducts.length === 0 ? '<div class="muted" style="padding:40px;text-align:center;">No sales yet</div>' : `
            <table class="tbl">
              <thead><tr><th>Product</th><th class="text-end">Qty</th><th class="text-end">Revenue</th></tr></thead>
              <tbody>
                ${topProducts.map(p => `<tr><td>${p.name}</td><td class="num-cell">${p.qty}</td><td class="num-cell">${fmt(p.revenue)}</td></tr>`).join('')}
              </tbody>
            </table>
          `}
        </div>
      </div>

      ${lowStock.length > 0 ? `
        <div class="card" style="margin-top:14px;border-left:4px solid var(--warn);">
          <h4 class="card-h" style="color:var(--warn)">⚠ Low Stock Alerts</h4>
          <table class="tbl">
            <thead><tr><th>Material</th><th class="text-end">Current</th><th class="text-end">Reorder Point</th><th>Supplier</th></tr></thead>
            <tbody>${lowStock.map(m => `<tr><td><strong>${m.name}</strong></td><td class="num-cell">${fmtNum(m.stock,1)} ${m.unit}</td><td class="num-cell">${fmtNum(m.reorderPoint,1)} ${m.unit}</td><td>${m.supplier||'—'}</td></tr>`).join('')}</tbody>
          </table>
        </div>
      ` : ''}
    </div>
  `;
}

/* ============================================================
   PROFIT & LOSS
   ============================================================ */
async function renderPnL(main) {
  const today = todayISO();
  const monthStart = today.slice(0,7) + '-01';
  let from = monthStart, to = today;

  main.innerHTML = `
    <div class="page">
      <div class="page-header">
        <div>
          <div class="page-title">Profit &amp; Loss Statement</div>
          <div class="page-subtitle">Computed in real time from journal entries.</div>
        </div>
        <div class="page-actions">
          <select class="input" id="pl-preset" style="width:auto">
            <option value="today">Today</option>
            <option value="week">Last 7 days</option>
            <option value="month" selected>This month</option>
            <option value="ytd">Year to date</option>
            <option value="all">All time</option>
            <option value="custom">Custom...</option>
          </select>
          <input class="input" type="date" id="pl-from" value="${from}" style="width:auto" />
          <span class="muted">to</span>
          <input class="input" type="date" id="pl-to" value="${to}" style="width:auto" />
          <button class="btn" id="pl-go">Apply</button>
        </div>
      </div>
      <div class="card" id="pl-body" style="max-width:760px;"></div>
    </div>
  `;

  const renderBody = async () => {
    const pnl = await getPnL(from || null, to || null);
    const revAccts = ACCOUNTS.filter(a => a.type==='revenue');
    const expAccts = ACCOUNTS.filter(a => a.type==='expense');
    const body = document.getElementById('pl-body');
    body.innerHTML = `
      <div style="text-align:center;margin-bottom:18px;">
        <h3 style="font-family:var(--display);font-size:22px;font-weight:600">${State.settings.shopName}</h3>
        <div class="muted">Profit &amp; Loss Statement</div>
        <div class="muted" style="font-size:12px;">Period: ${from || 'beginning'} → ${to || 'today'}</div>
      </div>

      <div class="fin-section">
        <h4>Revenue</h4>
        ${revAccts.map(a => {
          const v = pnl.revenue[a.id] || 0;
          if (v === 0) return '';
          return `<div class="fin-row indent"><span>${a.name}</span><span class="v">${fmt(v)}</span></div>`;
        }).join('')}
        <div class="fin-row subtotal"><span>Total Revenue</span><span class="v">${fmt(pnl.totalRevenue)}</span></div>
      </div>

      <div class="fin-section">
        <h4>Cost of Goods Sold</h4>
        ${[ '5010', '5100' ].map(id => {
          const a = ACCOUNTS.find(x => x.id===id);
          const v = pnl.expense[id] || 0;
          if (v === 0) return '';
          return `<div class="fin-row indent"><span>${a.name}</span><span class="v">${fmt(v)}</span></div>`;
        }).join('') || '<div class="fin-row indent muted">—</div>'}
        <div class="fin-row subtotal"><span>Total COGS</span><span class="v">${fmt(pnl.totalCogs)}</span></div>
      </div>

      <div class="fin-row total" style="background:var(--bg-2);padding:10px 12px;border-radius:8px;border-top:none;">
        <span>Gross Profit</span>
        <span class="v">${fmt(pnl.grossProfit)} <span class="muted" style="font-size:12px;">(${pnl.totalRevenue>0?(pnl.grossProfit/pnl.totalRevenue*100).toFixed(1)+'%':'—'})</span></span>
      </div>

      <div class="fin-section" style="margin-top:18px;">
        <h4>Operating Expenses</h4>
        ${expAccts.filter(a => !['5010','5100'].includes(a.id)).map(a => {
          const v = pnl.expense[a.id] || 0;
          if (v === 0) return '';
          return `<div class="fin-row indent"><span>${a.name}</span><span class="v">${fmt(v)}</span></div>`;
        }).join('') || '<div class="fin-row indent muted">No expenses</div>'}
        <div class="fin-row subtotal"><span>Total Operating Expenses</span><span class="v">${fmt(pnl.totalOpex)}</span></div>
      </div>

      <div class="fin-row total" style="background:${pnl.netProfit >= 0 ? '#dcfce7' : '#fee2e2'};padding:14px 16px;border-radius:10px;border-top:none;">
        <span>Net ${pnl.netProfit>=0?'Profit':'Loss'}</span>
        <span class="v" style="color:${pnl.netProfit>=0?'var(--good)':'var(--bad)'}">${fmt(pnl.netProfit)} <span class="muted" style="font-size:12px;">(${pnl.totalRevenue>0?(pnl.netProfit/pnl.totalRevenue*100).toFixed(1)+'%':'—'})</span></span>
      </div>
    `;
  };

  const setRange = (preset) => {
    const t2 = todayISO();
    const d = new Date();
    if (preset==='today') { from = t2; to = t2; }
    else if (preset==='week') { d.setDate(d.getDate()-7); from = d.toISOString().slice(0,10); to = t2; }
    else if (preset==='month') { from = t2.slice(0,7) + '-01'; to = t2; }
    else if (preset==='ytd') { from = t2.slice(0,4) + '-01-01'; to = t2; }
    else if (preset==='all') { from = ''; to = ''; }
    document.getElementById('pl-from').value = from;
    document.getElementById('pl-to').value = to;
    renderBody();
  };

  document.getElementById('pl-preset').onchange = (e) => { if (e.target.value !== 'custom') setRange(e.target.value); };
  document.getElementById('pl-go').onclick = () => {
    from = document.getElementById('pl-from').value;
    to = document.getElementById('pl-to').value;
    renderBody();
  };
  renderBody();
}

/* ============================================================

        </div>

        <div class="col">
          <div class="card">

              <button class="btn" id="data-export">⬇ Export All Data</button>
              <button class="btn" id="data-import">⬆ Import Backup</button>
              <input type="file" id="data-file" accept="application/json" style="display:none" />
            </div>
            <hr style="margin:16px 0;border:none;border-top:1px solid var(--line)" />
            <p class="muted" style="font-size:13px;margin-bottom:8px;"><strong>Danger zone:</strong></p>
            <button class="btn btn-danger" id="data-reset">Reset All Data (start fresh)</button>
          </div>

          <div class="card" id="users-card">
            <h4 class="card-h">${t('users')}</h4>
            <p class="muted" style="font-size:13px;margin-bottom:12px;">${t('usersHelp')}</p>

            <button class="btn btn-primary" id="user-add" style="margin-top:12px;">+ ${t('addUser')}</button>
          </div>

              <label class="field full" style="display:flex;align-items:center;gap:8px;cursor:pointer;">

              <li>Weighted-average cost on purchases</li>
              <li>Double-entry bookkeeping with auto-generated journal</li>
              <li>Real-time P&amp;L and Balance Sheet</li>
              <li>Multi-currency &amp; configurable VAT</li>
              <li>Food-cost % per product, top sellers, low-stock alerts</li>

  document.getElementById('s-save').onclick = async () => {
    s.shopName = document.getElementById('s-name').value;

    for (const store of STORES) dump[store] = await db.getAll(store);
    const blob = new Blob([JSON.stringify(dump, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `brewbook-backup-${todayISO()}.json`;
    a.click(); URL.revokeObjectURL(url);
    toast('Backup downloaded','success');
  };

    if (!confirm('Importing will REPLACE all current data. Continue?')) return;
    const text = await file.text();
    try {
      const dump = JSON.parse(text);
      for (const store of STORES) {
        if (!dump[store]) continue;
        await db.clear(store);
        for (const rec of dump[store]) await db.put(store, rec);

    await reloadState();
    toast(t('save')+' ✓','success');
  };
}

async function refreshUsersList() {
  const list = document.getElementById('users-list');
  if (!list) return;
  const users = await db.getAll('users');
  list.innerHTML = users.map(u => `
    <div class="user-row">
      <div class="ua">${(u.name||'?').trim().charAt(0).toUpperCase()}</div>
      <div class="info">
        <div class="n">${u.name}${State.cashier?.id===u.id?` <span class="me">${t('you')}</span>`:''}</div>
        <div class="r">${roleLabel(u.role)}</div>
      </div>
      <button class="btn" data-edit="${u.id}">${t('editUser')}</button>
      <button class="btn btn-danger" data-del="${u.id}">${t('delete')}</button>
    </div>
  `).join('') || `<div class="muted" style="font-size:13px;">No users yet.</div>`;
  list.querySelectorAll('[data-edit]').forEach(b => b.onclick = async () => {
    const u = users.find(x => x.id === b.dataset.edit);
    openUserEditor(u);
  });
  list.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
    const u = users.find(x => x.id === b.dataset.del);
    if (!u) return;
    if (State.cashier?.id === u.id) { toast(t('cantDeleteSelf'),'error'); return; }
    if (u.role === 'owner') {
      const owners = users.filter(x => x.role === 'owner');
      if (owners.length <= 1) { toast(t('cantDeleteLastOwner'),'error'); return; }
    }
    if (!confirm(`Delete user "${u.name}"?`)) return;
    await db.del('users', u.id);
    await refreshUsersList();
    toast('User deleted','success');
  });
}

async function openUserEditor(user) {
  const isNew = !user;
  const u = user ? { ...user } : { id: uid(), name: '', role: 'cashier', pinHash: '', pinSalt: '' };
  const pinHelp = isNew ? '4–6 digits' : 'leave blank to keep current';
  modal(`
    <div class="modal-header"><h3>${isNew ? t('addUser') : t('editUser')}</h3><button class="close-x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field full"><label>${t('name')}</label><input class="input" id="u-name" value="${u.name||''}" /></div>
        <div class="field"><label>${t('role')}</label>
          <select class="input" id="u-role">
            <option value="owner"   ${u.role==='owner'?'selected':''}>${t('roleOwner')}</option>
            <option value="manager" ${u.role==='manager'?'selected':''}>${t('roleManager')}</option>
            <option value="cashier" ${u.role==='cashier'?'selected':''}>${t('roleCashier')}</option>
          </select>
        </div>
        <div class="field"><label>${t('pin')} (${pinHelp})</label><input class="input" type="password" id="u-pin" inputmode="numeric" maxlength="6" value="" /></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-primary" id="u-save">${t('save')}</button>
    </div>
  `);
  document.getElementById('u-save').onclick = async () => {
    const name = document.getElementById('u-name').value.trim();
    const role = document.getElementById('u-role').value;
    const pin  = document.getElementById('u-pin').value.trim();
    if (!name) { toast(t('name')+' '+'required','error'); return; }
    if (isNew || pin) {
      if (!/^\d{4,6}$/.test(pin)) { toast(t('pinFourDigits'),'error'); return; }
      // Enforce PIN uniqueness across users (logins are PIN-only — collisions break the flow).
      const all = await db.getAll('users');
      for (const other of all) {
        if (other.id === u.id) continue;
        if (await verifyPin(pin, other)) { toast(t('pinTaken'),'error'); return; }
      }
    }
    if (!isNew && user.role === 'owner' && role !== 'owner') {
      const all = await db.getAll('users');
      const owners = all.filter(x => x.role === 'owner');
      if (owners.length <= 1) { toast(t('cantDeleteLastOwner'),'error'); return; }
    }
    u.name = name; u.role = role;
    if (isNew || pin) {
      u.pinSalt = u.pinSalt || u.id;
      u.pinHash = await hashPin(pin, u.pinSalt);
      u.failedAttempts = 0;
      u.lockedUntil = null;
    }
    await db.put('users', u);
    if (State.cashier?.id === u.id) State.cashier = u;
    closeModal();
    await refreshUsersList();
    renderSidebar();
    toast('User saved','success');
  };
}

/* ============================================================
   BOOTSTRAP
   ============================================================ */
async function boot() {
  try {
    await db.init();
    await seedIfEmpty();
    await migrateLegacyPins();
    await loadLockoutState();
    await reloadState();
    renderSidebar();
    await authAndShiftFlow();
    renderSidebar();
    await navigate('pos');
  } catch (err) {
    console.error('Boot failed:', err);
    document.getElementById('main').innerHTML = `<div style="padding:40px;color:#b91c1c;">Failed to start: ${err.message}<br/><br/>If this persists, your browser may be blocking IndexedDB (e.g. private/incognito mode). Try a regular browser window.</div>`;
  }
}
window.addEventListener('DOMContentLoaded', boot);
</script>
